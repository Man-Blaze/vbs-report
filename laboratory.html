<!DOCTYPE html>
<html>
<head>
    <title>VBS - Laboratory Report</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>body { font-family: Arial, sans-serif; max-width: 500px; margin: 20px auto; padding: 20px; background: #f5f5f5; }
    .container { background: white; padding: 20px; border-radius: 10px; }
    h1 { color: #2c7a4d; } label { display: block; margin-top: 15px; font-weight: bold; }
    input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; }
    button { width: 100%; padding: 12px; margin-top: 20px; background: #2c7a4d; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔬 Laboratory Report</h1>
        <form id="reportForm">
            <label>Officer Name:</label><input name="officer_name" required>
            <label>Report Date:</label><input name="report_date" type="date" required>
            <label>Lab Location:</label><select name="lab_location"><option>Santo</option><option>Port Vila</option></select>
            <label>Sample ID:</label><input name="sample_id">
            <label>Sample Type:</label><select name="sample_type"><option>Food</option><option>Water</option><option>Soil</option></select>
            <label>Test Type:</label><select name="test_type"><option>Microbiology</option><option>Chemical</option><option>DNA/GMO</option></select>
            <label>Test Result:</label><select name="test_result"><option>Pass</option><option>Fail</option><option>Inconclusive</option></select>
            <label>Lab Tests Conducted:</label><input name="lab_tests_conducted" type="number" value="0">
            <label>Non-Compliance Cases:</label><input name="non_compliance_cases" type="number" value="0">
            <label>Date Sample Received:</label><input name="date_sample_received" type="date">
            <label>Date Result Completed:</label><input name="date_result_completed" type="date">
            <label>Certificate Number:</label><input name="certificate_number">
            <label>Reagent Status:</label><select name="reagent_status"><option>Good</option><option>Low</option><option>Critical</option></select>
            <label>Equipment Issues:</label><textarea name="equipment_issues"></textarea>
            <label>Hours Worked:</label><input name="hours_worked" type="number" step="0.5" value="8">
            <label>Tasks Completed:</label><input name="tasks_completed" type="number" value="0">
            <label>Notes:</label><textarea name="inspector_notes"></textarea>
            <button type="submit">Submit Report</button>
        </form>
    </div>
    <script>
        const SUPABASE_URL = 'https://pdwctzueksfuspwwumdy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkd2N0enVla3NmdXNwd3d1bWR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MTA3NDQsImV4cCI6MjA5MjM4Njc0NH0.Xi7MH3MLuxDx1FK6BKLJi-n47SQn-gPgWxq35NuRpZY';
        document.getElementById('reportForm').onsubmit = async (e) => {
            e.preventDefault(); const formData = new FormData(e.target); const data = {};
            formData.forEach((v,k) => { if(v) data[k] = v; });
            data.status = 'PENDING';
            const response = await fetch(`${SUPABASE_URL}/rest/v1/laboratory_reports`, {
                method: 'POST', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            alert(response.ok ? '✅ Report submitted!' : '❌ Error');
            if(response.ok) e.target.reset();
        };
        document.querySelector('input[name="report_date"]').value = new Date().toISOString().split('T')[0];
    </script>
</body>
</html>
