<!DOCTYPE html>
<html>
<head>
    <title>VBS Daily Report</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 20px auto; padding: 20px; }
        input, select, textarea, button { width: 100%; padding: 10px; margin: 10px 0; }
        button { background-color: green; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>VBS Daily Report</h1>
    <form id="reportForm">
        <label>Officer Name:</label>
        <input name="officer_name" required>

        <label>Division:</label>
        <select name="division" required>
            <option>Provincial</option>
            <option>Laboratory</option>
            <option>Packhouse</option>
            <option>Standards</option>
            <option>Administration</option>
        </select>

        <label>Inspections Conducted:</label>
        <input name="inspections_conducted" type="number" value="0">

        <label>Non-Compliance Cases:</label>
        <input name="non_compliance_cases" type="number" value="0">

        <label>Issue Description (if any):</label>
        <textarea name="issue_description"></textarea>

        <button type="submit">Submit Report</button>
    </form>

    <script>
        const SUPABASE_URL = 'https://pdwctzueksfuspwwumdy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkd2N0enVla3NmdXNwd3d1bWR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MTA3NDQsImV4cCI6MjA5MjM4Njc0NH0.Xi7MH3MLuxDx1FK6BKLJi-n47SQn-gPgWxq35NuRpZY';

        document.getElementById('reportForm').onsubmit = async (e) => {
            e.preventDefault();

            const formData = new FormData(e.target);
            const data = {};
            formData.forEach((value, key) => {
                data[key] = value;
            });
            data.status = 'PENDING';
            data.report_date = new Date().toISOString().split('T')[0];

            // Convert to numbers
            data.inspections_conducted = parseInt(data.inspections_conducted) || 0;
            data.non_compliance_cases = parseInt(data.non_compliance_cases) || 0;

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/vbs_reports`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    alert('✅ Report submitted! Manager will review.');
                    document.getElementById('reportForm').reset();
                } else {
                    const error = await response.text();
                    alert('❌ Error: ' + error);
                }
            } catch (error) {
                alert('❌ Connection error: ' + error.message);
            }
        };
    </script>
</body>
</html>
