<!DOCTYPE html>
<html>
<head>
    <title>VBS Timesheet - Secure Attendance</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Same styles as before - keeping it clean */
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; max-width: 1400px; margin: 0 auto; padding: 20px; background: #f0f2f5; }
        .header { background: linear-gradient(135deg, #1a5a3a, #0d3b24); color: white; padding: 20px; border-radius: 16px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .logout { background: #dc3545; color: white; border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: white; border-radius: 16px; padding: 15px; text-align: center; }
        .stat-number { font-size: 32px; font-weight: bold; color: #1a5a3a; }
        .mode-switch { display: flex; gap: 10px; margin-bottom: 20px; }
        .mode-btn { padding: 10px 24px; border: none; border-radius: 40px; cursor: pointer; background: #e2e8f0; }
        .mode-btn.active { background: #1a5a3a; color: white; }
        .main-content { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; }
        @media (max-width: 900px) { .main-content { grid-template-columns: 1fr; } }
        .clock-panel { background: white; border-radius: 20px; padding: 20px; }
        .staff-panel { background: white; border-radius: 20px; padding: 20px; overflow-x: auto; }
        .btn-clock-in { background: #2c7a4d; color: white; border: none; padding: 14px; border-radius: 40px; cursor: pointer; width: 100%; margin-top: 15px; }
        .btn-clock-out { background: #dc3545; color: white; border: none; padding: 14px; border-radius: 40px; cursor: pointer; width: 100%; margin-top: 10px; }
        select, input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 12px; margin-top: 5px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 8px; text-align: left; border-bottom: 1px solid #eee; }
        .status-present { background: #d4edda; color: #155724; padding: 4px 12px; border-radius: 20px; display: inline-block; font-size: 11px; }
        .status-absent { background: #f8d7da; color: #721c24; padding: 4px 12px; border-radius: 20px; display: inline-block; font-size: 11px; }
        .status-pending { background: #fef3c7; color: #92400e; padding: 4px 12px; border-radius: 20px; display: inline-block; font-size: 11px; }
        .refresh-btn { background: #6c757d; color: white; border: none; padding: 6px 15px; border-radius: 20px; cursor: pointer; margin-left: 10px; }
        .current-time { font-size: 32px; text-align: center; color: #1a5a3a; margin: 15px 0; font-family: monospace; }
    </style>
</head>
<body>

<div class="header">
    <h1>⏰ VBS Timesheet Tracker</h1>
    <div>
        <span id="userName" style="margin-right: 15px;">Loading...</span>
        <button class="logout" onclick="logout()">Logout</button>
    </div>
</div>

<div class="stats-grid">
    <div class="stat-card"><div class="stat-number" id="totalStaff">0</div><div class="stat-label">Total Staff</div></div>
    <div class="stat-card"><div class="stat-number" id="presentCount">0</div><div class="stat-label">Present Today</div></div>
    <div class="stat-card"><div class="stat-number" id="absentCount">0</div><div class="stat-label">Absent Today</div></div>
    <div class="stat-card"><div class="stat-number" id="pendingCount">0</div><div class="stat-label">Pending</div></div>
</div>

<div class="mode-switch">
    <button class="mode-btn active" onclick="setMode('focal')">👔 Focal Point Mode</button>
    <button class="mode-btn" onclick="setMode('self')">🔓 Self Clock Mode</button>
</div>

<div class="main-content">
    <div class="clock-panel" id="focalPanel">
        <div class="current-time" id="currentTime">--:--:--</div>
        <label>📅 Date</label>
        <input type="date" id="reportDate">
        <label>👤 Select Staff</label>
        <select id="staffSelect"><option>-- Select Staff --</option></select>
        <button class="btn-clock-in" onclick="clockIn()">✅ Clock In</button>
        <button class="btn-clock-out" onclick="clockOut()">❌ Clock Out</button>
        <div id="pendingPanel"></div>
    </div>
    
    <div class="clock-panel" id="selfPanel" style="display:none;">
        <div class="current-time" id="selfTime">--:--:--</div>
        <label>📅 Date</label>
        <input type="date" id="selfDate">
        <label>📝 Reason</label>
        <textarea id="selfReason" rows="2" placeholder="Why are you self-clocking?"></textarea>
        <button class="btn-clock-in" style="background:#17a2b8;" onclick="requestSelfClock()">📤 Request Self Clock In</button>
    </div>
    
    <div class="staff-panel">
        <h3>Today's Attendance <button class="refresh-btn" onclick="loadAttendance()">↻</button></h3>
        <div style="overflow-x: auto; max-height: 500px;">
            <table id="attendanceTable"><thead><tr><th>Staff</th><th>Division</th><th>Time In</th><th>Time Out</th><th>Hours</th><th>Status</th></tr></thead><tbody id="attendanceBody"></tbody></table>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://pdwctzueksfuspwwumdy.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkd2N0enVla3NmdXNwd3d1bWR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MTA3NDQsImV4cCI6MjA5MjM4Njc0NH0.Xi7MH3MLuxDx1FK6BKLJi-n47SQn-gPgWxq35NuRpZY';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentUser = null;
    let currentUserRole = null;
    let currentUserDivision = null;
    let currentUserLocation = null;
    
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('reportDate').value = today;
    document.getElementById('selfDate').value = today;
    
    function updateTime() {
        const now = new Date().toLocaleTimeString();
        document.getElementById('currentTime').innerHTML = now;
        document.getElementById('selfTime').innerHTML = now;
    }
    setInterval(updateTime, 1000);
    updateTime();
    
    async function checkAuth() {
        const { data: { session } } = await supabase.auth.getSession();
        
        if (!session) {
            window.location.href = 'login.html';
            return;
        }
        
        currentUser = session.user;
        
        // Get user profile
        const { data: profile } = await supabase
            .from('user_profiles')
            .select('*')
            .eq('id', currentUser.id)
            .single();
        
        currentUserRole = profile?.role || 'staff';
        currentUserDivision = profile?.division;
        currentUserLocation = profile?.location;
        
        document.getElementById('userName').innerHTML = `${profile?.full_name || currentUser.email} (${currentUserRole})`;
        
        if (currentUserRole === 'focal_point') {
            document.getElementById('focalPanel').style.display = 'block';
            document.getElementById('selfPanel').style.display = 'none';
            await loadStaffList();
            await loadAttendance();
            await loadPendingSelfClocks();
        } else {
            document.getElementById('focalPanel').style.display = 'none';
            document.getElementById('selfPanel').style.display = 'block';
            await loadSelfAttendance();
        }
    }
    
    async function logout() {
        await supabase.auth.signOut();
        localStorage.clear();
        window.location.href = 'login.html';
    }
    
    function setMode(mode) {
        if (mode === 'focal' && currentUserRole === 'focal_point') {
            document.getElementById('focalPanel').style.display = 'block';
            document.getElementById('selfPanel').style.display = 'none';
            loadAttendance();
        } else if (mode === 'self') {
            document.getElementById('focalPanel').style.display = 'none';
            document.getElementById('selfPanel').style.display = 'block';
            loadSelfAttendance();
        }
    }
    
    async function loadStaffList() {
        let query = supabase.from('staff_list').select('*').eq('is_active', true).order('staff_name');
        
        if (currentUserDivision === 'Provincial' && currentUserLocation) {
            query = query.eq('division', 'Provincial').eq('location', currentUserLocation);
        } else if (currentUserDivision) {
            query = query.eq('division', currentUserDivision);
        }
        
        const { data: staff } = await query;
        const select = document.getElementById('staffSelect');
        select.innerHTML = '<option value="">-- Select Staff --</option>';
        for (let s of staff || []) {
            select.innerHTML += `<option value="${s.staff_name}">${s.staff_name}</option>`;
        }
        document.getElementById('totalStaff').innerText = staff?.length || 0;
    }
    
    async function loadAttendance() {
        const date = document.getElementById('reportDate').value;
        
        let staffQuery = supabase.from('staff_list').select('*').eq('is_active', true).order('staff_name');
        if (currentUserDivision === 'Provincial' && currentUserLocation) {
            staffQuery = staffQuery.eq('division', 'Provincial').eq('location', currentUserLocation);
        } else if (currentUserDivision) {
            staffQuery = staffQuery.eq('division', currentUserDivision);
        }
        const { data: staff } = await staffQuery;
        
        const { data: records } = await supabase
            .from('timesheet')
            .select('*')
            .eq('report_date', date);
        
        let present = 0, absent = 0, pending = 0;
        let html = '';
        
        for (let s of staff || []) {
            const record = records?.find(r => r.officer_name === s.staff_name);
            let timeIn = '-', timeOut = '-', hours = '-', status = 'ABSENT', statusClass = 'status-absent';
            
            if (record?.time_in) {
                timeIn = record.time_in;
                if (record.status === 'PENDING_APPROVAL') {
                    status = 'PENDING';
                    statusClass = 'status-pending';
                    pending++;
                } else if (record.time_out) {
                    timeOut = record.time_out;
                    hours = record.hours_worked;
                    status = 'CLOCKED OUT';
                    statusClass = 'status-present';
                    present++;
                } else {
                    status = 'PRESENT';
                    statusClass = 'status-present';
                    present++;
                }
            } else {
                absent++;
            }
            
            html += `<tr><td>${s.staff_name}</td><td>${s.division || '-'}</td><td>${timeIn}</td><td>${timeOut}</td><td>${hours}</td><td><span class="${statusClass}">${status}</span></td></tr>`;
        }
        
        document.getElementById('attendanceBody').innerHTML = html;
        document.getElementById('presentCount').innerText = present;
        document.getElementById('absentCount').innerText = absent;
        document.getElementById('pendingCount').innerText = pending;
    }
    
    async function loadSelfAttendance() {
        const date = document.getElementById('selfDate').value;
        const { data: records } = await supabase
            .from('timesheet')
            .select('*')
            .eq('user_id', currentUser.id)
            .eq('report_date', date);
        
        let html = '';
        if (records?.length > 0) {
            const r = records[0];
            let status = r.status === 'PENDING_APPROVAL' ? 'PENDING' : (r.time_out ? 'CLOCKED OUT' : 'PRESENT');
            let statusClass = r.status === 'PENDING_APPROVAL' ? 'status-pending' : 'status-present';
            html = `<tr><td>${currentUser.email}</td><td>-</td><td>${r.time_in || '-'}</td><td>${r.time_out || '-'}</td><td>${r.hours_worked || 0}</td><td><span class="${statusClass}">${status}</span></td></tr>`;
            document.getElementById('presentCount').innerText = (r.time_in && r.status !== 'PENDING_APPROVAL') ? 1 : 0;
            document.getElementById('absentCount').innerText = 0;
        } else {
            html = `<tr><td colspan="6">No record for today. Use Self Clock Mode.</td></tr>`;
            document.getElementById('presentCount').innerText = 0;
            document.getElementById('absentCount').innerText = 1;
        }
        document.getElementById('attendanceBody').innerHTML = html;
        document.getElementById('totalStaff').innerText = 1;
    }
    
    async function loadPendingSelfClocks() {
        const date = document.getElementById('reportDate').value;
        const { data: pending } = await supabase
            .from('timesheet')
            .select('*')
            .eq('clock_method', 'self')
            .eq('status', 'PENDING_APPROVAL')
            .eq('report_date', date);
        
        if (pending?.length > 0) {
            let html = `<div style="margin-top:20px; background:#fff9e6; padding:15px; border-radius:12px;"><h4>⏳ Pending (${pending.length})</h4>`;
            for (let p of pending) {
                html += `<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #fef3c7;"><div><strong>${p.officer_name}</strong><br><small>${p.time_in} | ${p.late_reason}</small></div><div><button class="btn-approve" style="background:#28a745; color:white; border:none; padding:4px 12px; border-radius:20px; margin-right:5px;" onclick="approveSelfClock(${p.id})">✓</button><button style="background:#dc3545; color:white; border:none; padding:4px 12px; border-radius:20px;" onclick="rejectSelfClock(${p.id})">✗</button></div></div>`;
            }
            html += `</div>`;
            document.getElementById('pendingPanel').innerHTML = html;
        } else {
            document.getElementById('pendingPanel').innerHTML = '';
        }
    }
    
    async function approveSelfClock(id) {
        const { error } = await supabase
            .from('timesheet')
            .update({ status: 'APPROVED', approved_by_user_id: currentUser.id, approved_at: new Date().toISOString() })
            .eq('id', id);
        
        if (!error) {
            alert('✅ Self-clock approved!');
            await loadAttendance();
            await loadPendingSelfClocks();
        }
    }
    
    async function rejectSelfClock(id) {
        const reason = prompt('Reason for rejection:');
        if (!reason) return;
        const { error } = await supabase
            .from('timesheet')
            .update({ status: 'REJECTED', rejection_reason: reason, approved_by_user_id: currentUser.id })
            .eq('id', id);
        
        if (!error) {
            alert('❌ Self-clock rejected');
            await loadAttendance();
            await loadPendingSelfClocks();
        }
    }
    
    async function clockIn() {
        const staffName = document.getElementById('staffSelect').value;
        const date = document.getElementById('reportDate').value;
        if (!staffName) { alert('Select staff'); return; }
        
        const timeIn = new Date().toLocaleTimeString();
        const { error } = await supabase.from('timesheet').insert({
            officer_name: staffName,
            division: currentUserDivision,
            report_date: date,
            time_in: timeIn,
            clock_method: 'focal_point',
            clocked_by_user_id: currentUser.id,
            status: 'APPROVED'
        });
        
        if (!error) {
            alert(`✅ ${staffName} clocked IN at ${timeIn}`);
            await loadAttendance();
            document.getElementById('staffSelect').value = '';
        } else { alert('Failed'); }
    }
    
    async function clockOut() {
        const staffName = document.getElementById('staffSelect').value;
        const date = document.getElementById('reportDate').value;
        if (!staffName) { alert('Select staff'); return; }
        
        const { data: records } = await supabase
            .from('timesheet')
            .select('*')
            .eq('officer_name', staffName)
            .eq('report_date', date)
            .is('time_out', null);
        
        if (!records?.length) { alert('No clock-in record'); return; }
        
        const timeOut = new Date().toLocaleTimeString();
        const record = records[0];
        
        const inParts = record.time_in.split(':');
        const outParts = timeOut.split(':');
        let hours = parseInt(outParts[0]) - parseInt(inParts[0]);
        let minutes = parseInt(outParts[1]) - parseInt(inParts[1]);
        if (minutes < 0) { hours--; minutes += 60; }
        const totalHours = hours + minutes / 60;
        
        const { error } = await supabase
            .from('timesheet')
            .update({ time_out: timeOut, hours_worked: totalHours.toFixed(2) })
            .eq('id', record.id);
        
        if (!error) {
            alert(`❌ ${staffName} clocked OUT at ${timeOut} | Hours: ${totalHours.toFixed(2)}`);
            await loadAttendance();
        }
    }
    
    async function requestSelfClock() {
        const date = document.getElementById('selfDate').value;
        const reason = document.getElementById('selfReason').value;
        if (!reason) { alert('Please provide a reason'); return; }
        
        const timeIn = new Date().toLocaleTimeString();
        const { error } = await supabase.from('timesheet').insert({
            officer_name: currentUser.email.split('@')[0],
            user_id: currentUser.id,
            report_date: date,
            time_in: timeIn,
            late_reason: reason,
            clock_method: 'self',
            clocked_by_user_id: currentUser.id,
            status: 'PENDING_APPROVAL'
        });
        
        if (!error) {
            alert(`📤 Self-clock request sent at ${timeIn}. Waiting for approval.`);
            await loadSelfAttendance();
            document.getElementById('selfReason').value = '';
        } else { alert('Failed'); }
    }
    
    checkAuth();
</script>
</body>
</html>
