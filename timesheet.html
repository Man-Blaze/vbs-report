<!DOCTYPE html>
<html>
<head>
    <title>VBS Timesheet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial; max-width: 700px; margin: 20px auto; padding: 20px; background: #f5f5f5; }
        .container { background: white; padding: 20px; border-radius: 10px; }
        h1 { color: #2c7a4d; }
        .user-info { background: #e8f5e9; padding: 10px; border-radius: 8px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .logout { background: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .mode-selector { display: flex; gap: 10px; margin-bottom: 15px; }
        .mode-btn { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 8px; background: white; cursor: pointer; }
        .mode-btn.active { background: #2c7a4d; color: white; border-color: #2c7a4d; }
        label { display: block; margin-top: 12px; font-weight: bold; }
        select, input, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 15px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; }
        .clock-in { background: #2c7a4d; color: white; }
        .clock-out { background: #dc3545; color: white; }
        .self-clock { background: #17a2b8; color: white; }
        .staff-list { margin-top: 20px; border-top: 1px solid #ddd; padding-top: 15px; max-height: 400px; overflow-y: auto; }
        .staff-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .staff-name { font-weight: bold; }
        .staff-status { font-size: 12px; padding: 3px 10px; border-radius: 20px; }
        .status-present { background: #d4edda; color: #155724; }
        .status-absent { background: #f8d7da; color: #721c24; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-clocked-out { background: #cce5ff; color: #004085; }
        .small-text { font-size: 12px; color: #666; margin-top: 10px; }
        .current-time { text-align: center; font-size: 28px; font-weight: bold; color: #2c7a4d; margin: 10px 0; }
        .alert-info { background: #cce5ff; padding: 10px; border-radius: 8px; margin-bottom: 15px; color: #004085; }
        .refresh-btn { background: #6c757d; color: white; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; font-size: 12px; margin-left: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⏰ VBS Timesheet</h1>
        
        <div class="user-info">
            <span>👤 <span id="userName"></span></span>
            <button class="logout" onclick="logout()">Logout</button>
        </div>
        
        <div class="current-time" id="currentTime"></div>
        
        <div id="focalMode">
            <div class="mode-selector" id="modeSelector">
                <button class="mode-btn active" onclick="setMode('focal')">👔 Focal Point Mode</button>
                <button class="mode-btn" onclick="setMode('self')">🔓 Self Clock Mode</button>
            </div>
            
            <label>Select Staff Name:</label>
            <select id="staffSelect" required>
                <option value="">-- Select Staff --</option>
            </select>
            
            <label>Date:</label>
            <input type="date" id="reportDate" required>
            
            <button id="clockInBtn" class="clock-in" onclick="simpleClockIn()">✅ KAM IN - Clock In</button>
            <button id="clockOutBtn" class="clock-out" onclick="simpleClockOut()">❌ KAM OUT - Clock Out</button>
        </div>
        
        <div id="selfMode" style="display:none;">
            <div class="alert-info">
                <strong>🔓 Self Clock Mode</strong><br>
                You are clocking yourself. Manager will approve.
            </div>
            
            <label>Date:</label>
            <input type="date" id="selfReportDate" required>
            
            <label>Reason (e.g., Focal point absent, sick, travel):</label>
            <textarea id="selfReason" rows="2" placeholder="Why are you self clocking?"></textarea>
            
            <button id="selfClockInBtn" class="self-clock" onclick="selfClockIn()">✅ SELF CLOCK IN</button>
            <button id="selfClockOutBtn" class="clock-out" onclick="selfClockOut()">❌ SELF CLOCK OUT</button>
        </div>
        
        <div class="staff-list">
            <strong>📋 Today's Staff Status</strong>
            <button class="refresh-btn" onclick="refreshStatus()">↻ Refresh</button>
            <div id="staffStatusList">Loading...</div>
        </div>
        
        <div class="small-text">
            ⏰ Standard hours: 8:00 AM - 5:00 PM<br>
            🔓 Self Clock: Use when focal point is absent<br>
            💡 Status persists across logins - clock in once, stay PRESENT until you clock out
        </div>
    </div>
    
    <script>
        const SUPABASE_URL = 'https://pdwctzueksfuspwwumdy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkd2N0enVla3NmdXNwd3d1bWR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MTA3NDQsImV4cCI6MjA5MjM4Njc0NH0.Xi7MH3MLuxDx1FK6BKLJi-n47SQn-gPgWxq35NuRpZY';
        
        let currentFocalPoint = null;
        let currentFocalPointDivision = null;
        let currentFocalPointLocation = null;
        let currentUserEmail = null;
        let currentUserName = null;
        
        function updateTime() {
            const now = new Date();
            document.getElementById('currentTime').innerHTML = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
        setInterval(updateTime, 1000);
        updateTime();
        
        function refreshStatus() {
            const mode = document.getElementById('focalMode').style.display === 'block' ? 'focal' : 'self';
            if (mode === 'focal') {
                loadTodayStatus();
            } else {
                loadSelfTodayStatus();
            }
        }
        
        async function checkAuth() {
            const token = localStorage.getItem('vbs_token');
            const userType = localStorage.getItem('vbs_user_type');
            
            console.log('Token exists:', !!token);
            console.log('User type:', userType);
            
            if (!token) {
                console.log('No token, redirecting to login');
                window.location.replace('login.html');
                return;
            }
            
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                currentUserEmail = payload.email;
                console.log('User email:', currentUserEmail);
                
                if (userType === 'focal_point') {
                    console.log('Loading focal point mode');
                    const response = await fetch(`${SUPABASE_URL}/rest/v1/focal_points?email=eq.${currentUserEmail}`, {
                        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
                    });
                    const focalPoints = await response.json();
                    console.log('Focal points found:', focalPoints.length);
                    
                    if (focalPoints.length > 0) {
                        currentFocalPoint = focalPoints[0].name;
                        currentFocalPointDivision = focalPoints[0].division;
                        currentFocalPointLocation = focalPoints[0].location;
                        document.getElementById('userName').innerText = `${currentFocalPoint} (Focal Point)`;
                        document.getElementById('modeSelector').style.display = 'flex';
                        document.getElementById('selfMode').style.display = 'none';
                        document.getElementById('focalMode').style.display = 'block';
                        await loadStaffList();
                        await loadTodayStatus();
                        return;
                    }
                }
                
                // Staff mode
                console.log('Loading staff mode');
                currentUserName = currentUserEmail.split('@')[0];
                document.getElementById('userName').innerText = `${currentUserName} (Staff)`;
                setMode('self');
                
            } catch (e) {
                console.error('Auth error:', e);
                logout();
            }
        }
        
        function logout() {
            console.log('Logging out');
            localStorage.clear();
            window.location.replace('login.html');
        }
        
        function setMode(mode) {
            if (mode === 'focal') {
                document.getElementById('focalMode').style.display = 'block';
                document.getElementById('selfMode').style.display = 'none';
                loadStaffList();
                loadTodayStatus();
            } else {
                document.getElementById('focalMode').style.display = 'none';
                document.getElementById('selfMode').style.display = 'block';
                document.getElementById('selfReportDate').value = new Date().toISOString().split('T')[0];
                loadSelfTodayStatus();
            }
        }
        
        document.getElementById('reportDate').value = new Date().toISOString().split('T')[0];
        document.getElementById('reportDate').addEventListener('change', () => loadTodayStatus());
        
        async function loadStaffList() {
            if (!currentFocalPointDivision) return;
            const token = localStorage.getItem('vbs_token');
            let url = `${SUPABASE_URL}/rest/v1/staff_list?is_active=eq.true&order=staff_name.asc`;
            
            if (currentFocalPointDivision === 'Provincial') {
                url += `&division=eq.${currentFocalPointDivision}&location=eq.${currentFocalPointLocation}`;
            } else {
                url += `&division=eq.${currentFocalPointDivision}`;
            }
            
            const response = await fetch(url, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
            });
            const staff = await response.json();
            
            const select = document.getElementById('staffSelect');
            select.innerHTML = '<option value="">-- Select Staff --</option>';
            for (let s of staff) {
                select.innerHTML += `<option value="${s.staff_name}">${s.staff_name}</option>`;
            }
        }
        
        async function loadTodayStatus() {
            const date = document.getElementById('reportDate').value;
            const token = localStorage.getItem('vbs_token');
            
            if (!date) return;
            
            let url = `${SUPABASE_URL}/rest/v1/staff_list?is_active=eq.true&order=staff_name.asc`;
            if (currentFocalPointDivision === 'Provincial') {
                url += `&division=eq.${currentFocalPointDivision}&location=eq.${currentFocalPointLocation}`;
            } else {
                url += `&division=eq.${currentFocalPointDivision}`;
            }
            
            const staffResponse = await fetch(url, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
            });
            const allStaff = await staffResponse.json();
            
            if (allStaff.length === 0) {
                document.getElementById('staffStatusList').innerHTML = '<div>No staff assigned</div>';
                return;
            }
            
            const timesheetResponse = await fetch(`${SUPABASE_URL}/rest/v1/timesheet?report_date=eq.${date}`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
            });
            const records = await timesheetResponse.json();
            
            let presentCount = 0;
            let clockedInCount = 0;
            let html = '';
            
            for (let staff of allStaff) {
                const record = records.find(r => r.officer_name === staff.staff_name);
                let statusText = '❌ ABSENT';
                let statusClass = 'status-absent';
                
                // FIX: Check if staff has clocked in (regardless of time)
                if (record && record.time_in) {
                    if (record.time_out) {
                        // Clocked out already
                        statusText = `⏳ CLOCKED OUT (${record.hours_worked || 0} hrs)`;
                        statusClass = 'status-clocked-out';
                        presentCount++;
                    } else {
                        // Clocked in, not out yet - PRESENT
                        statusText = `✅ PRESENT (IN: ${record.time_in})`;
                        statusClass = 'status-present';
                        presentCount++;
                        clockedInCount++;
                    }
                } else if (record && !record.time_in) {
                    statusText = '❌ ABSENT';
                    statusClass = 'status-absent';
                }
                
                html += `<div class="staff-item">
                            <span class="staff-name">${staff.staff_name}</span>
                            <span class="staff-status ${statusClass}">${statusText}</span>
                         </div>`;
            }
            
            document.getElementById('staffStatusList').innerHTML = html;
            document.querySelector('.staff-list strong').innerHTML = `📋 Today's Status (${presentCount}/${allStaff.length} Present | ${clockedInCount} Active)`;
        }
        
        async function loadSelfTodayStatus() {
            const date = document.getElementById('selfReportDate').value;
            const token = localStorage.getItem('vbs_token');
            
            if (!date) return;
            
            const response = await fetch(`${SUPABASE_URL}/rest/v1/timesheet?officer_name=eq.${currentUserName}&report_date=eq.${date}`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
            });
            const records = await response.json();
            
            if (records.length > 0) {
                const r = records[0];
                let statusText = '';
                let statusClass = '';
                
                if (r.time_in && !r.time_out) {
                    statusText = `✅ CLOCKED IN at ${r.time_in}`;
                    statusClass = 'status-present';
                } else if (r.time_out) {
                    statusText = `⏳ CLOCKED OUT (${r.hours_worked} hrs)`;
                    statusClass = 'status-clocked-out';
                } else {
                    statusText = '❌ NOT CLOCKED IN';
                    statusClass = 'status-absent';
                }
                
                document.getElementById('staffStatusList').innerHTML = `
                    <div class="staff-item">
                        <span class="staff-name">${currentUserName}</span>
                        <span class="staff-status ${statusClass}">${statusText}</span>
                    </div>
                `;
            } else {
                document.getElementById('staffStatusList').innerHTML = '<div class="staff-item"><span class="staff-name">No clock in today</span><span class="staff-status status-absent">❌ ABSENT</span></div>';
            }
        }
        
        async function simpleClockIn() {
            const staffName = document.getElementById('staffSelect').value;
            const date = document.getElementById('reportDate').value;
            if (!staffName) { alert('Select staff first'); return; }
            
            const token = localStorage.getItem('vbs_token');
            
            // Check if already clocked in today
            const checkResponse = await fetch(`${SUPABASE_URL}/rest/v1/timesheet?officer_name=eq.${staffName}&report_date=eq.${date}`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
            });
            const existing = await checkResponse.json();
            
            if (existing.length > 0 && existing[0].time_in && !existing[0].time_out) {
                alert(`⚠️ ${staffName} is already clocked in at ${existing[0].time_in}!`);
                return;
            }
            
            if (existing.length > 0 && existing[0].time_out) {
                alert(`⚠️ ${staffName} already clocked out today at ${existing[0].time_out}`);
                return;
            }
            
            const timeIn = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            
            const data = {
                officer_name: staffName,
                division: currentFocalPointDivision,
                report_date: date,
                time_in: timeIn,
                clock_method: 'focal_point',
                clocked_by: currentFocalPoint,
                status: 'PENDING'
            };
            
            const response = await fetch(`${SUPABASE_URL}/rest/v1/timesheet`, {
                method: 'POST',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            
            if (response.ok) {
                alert(`✅ ${staffName} clocked IN at ${timeIn}`);
                await loadTodayStatus();
                document.getElementById('staffSelect').value = '';
            } else {
                const error = await response.text();
                alert('Failed to clock in: ' + error);
            }
        }
        
        async function simpleClockOut() {
            const staffName = document.getElementById('staffSelect').value;
            const date = document.getElementById('reportDate').value;
            if (!staffName) { alert('Select staff first'); return; }
            
            const token = localStorage.getItem('vbs_token');
            
            const response = await fetch(`${SUPABASE_URL}/rest/v1/timesheet?officer_name=eq.${staffName}&report_date=eq.${date}`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
            });
            const records = await response.json();
            
            if (records.length === 0) { 
                alert(`❌ ${staffName} hasn't clocked in today! Cannot clock out.`);
                return; 
            }
            const record = records[0];
            if (!record.time_in) { 
                alert(`❌ ${staffName} hasn't clocked in!`);
                return; 
            }
            if (record.time_out) { 
                alert(`⚠️ ${staffName} already clocked out at ${record.time_out}`);
                return; 
            }
            
            const timeOut = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            
            const timeInParts = record.time_in.split(':');
            const timeOutParts = timeOut.split(':');
            let hours = parseInt(timeOutParts[0]) - parseInt(timeInParts[0]);
            let minutes = parseInt(timeOutParts[1]) - parseInt(timeInParts[1]);
            if (minutes < 0) { hours--; minutes += 60; }
            const totalHours = hours + minutes / 60;
            
            const updateResponse = await fetch(`${SUPABASE_URL}/rest/v1/timesheet?id=eq.${record.id}`, {
                method: 'PATCH',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    time_out: timeOut,
                    hours_worked: totalHours.toFixed(2),
                    status: 'PENDING'
                })
            });
            
            if (updateResponse.ok) {
                alert(`❌ ${staffName} clocked OUT at ${timeOut} | Hours: ${totalHours.toFixed(2)}`);
                await loadTodayStatus();
                document.getElementById('staffSelect').value = '';
            } else {
                alert('Failed to clock out');
            }
        }
        
        async function selfClockIn() {
            const date = document.getElementById('selfReportDate').value;
            const reason = document.getElementById('selfReason').value;
            const token = localStorage.getItem('vbs_token');
            
            if (!reason) { alert('Please provide a reason'); return; }
            
            // Check if already clocked in today
            const checkResponse = await fetch(`${SUPABASE_URL}/rest/v1/timesheet?officer_name=eq.${currentUserName}&report_date=eq.${date}`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
            });
            const existing = await checkResponse.json();
            
            if (existing.length > 0 && existing[0].time_in && !existing[0].time_out) {
                alert(`⚠️ You are already clocked in at ${existing[0].time_in}!`);
                return;
            }
            
            const timeIn = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            
            const data = {
                officer_name: currentUserName,
                division: 'Staff',
                report_date: date,
                time_in: timeIn,
                late_reason: `Self clock: ${reason}`,
                clock_method: 'self',
                clocked_by: currentUserName,
                status: 'PENDING'
            };
            
            const response = await fetch(`${SUPABASE_URL}/rest/v1/timesheet`, {
                method: 'POST',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            
            if (response.ok) {
                alert(`✅ Self clocked IN at ${timeIn}`);
                await loadSelfTodayStatus();
                document.getElementById('selfReason').value = '';
            } else {
                alert('Failed to clock in');
            }
        }
        
        async function selfClockOut() {
            const date = document.getElementById('selfReportDate').value;
            const token = localStorage.getItem('vbs_token');
            
            const response = await fetch(`${SUPABASE_URL}/rest/v1/timesheet?officer_name=eq.${currentUserName}&report_date=eq.${date}`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
            });
            const records = await response.json();
            
            if (records.length === 0) { 
                alert('You haven\'t clocked in today!');
                return; 
            }
            const record = records[0];
            if (!record.time_in) { 
                alert('You haven\'t clocked in!');
                return; 
            }
            if (record.time_out) { 
                alert(`You already clocked out at ${record.time_out}`);
                return; 
            }
            
            const timeOut = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            
            const timeInParts = record.time_in.split(':');
            const timeOutParts = timeOut.split(':');
            let hours = parseInt(timeOutParts[0]) - parseInt(timeInParts[0]);
            let minutes = parseInt(timeOutParts[1]) - parseInt(timeInParts[1]);
            if (minutes < 0) { hours--; minutes += 60; }
            const totalHours = hours + minutes / 60;
            
            const updateResponse = await fetch(`${SUPABASE_URL}/rest/v1/timesheet?id=eq.${record.id}`, {
                method: 'PATCH',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    time_out: timeOut,
                    hours_worked: totalHours.toFixed(2),
                    status: 'PENDING'
                })
            });
            
            if (updateResponse.ok) {
                alert(`❌ Self clocked OUT at ${timeOut} | Hours: ${totalHours.toFixed(2)}`);
                await loadSelfTodayStatus();
            } else {
                alert('Failed to clock out');
            }
        }
        
        // Start the app
        checkAuth();
    </script>
</body>
</html>
