<!DOCTYPE html>
<html>
<head>
    <title>VBS Timesheet - Focal Point</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial; max-width: 600px; margin: 20px auto; padding: 20px; background: #f5f5f5; }
        .container { background: white; padding: 20px; border-radius: 10px; }
        h1 { color: #2c7a4d; }
        .user-info { background: #e8f5e9; padding: 10px; border-radius: 8px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .logout { background: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; }
        label { display: block; margin-top: 12px; font-weight: bold; }
        select, input, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        textarea { resize: vertical; }
        button { width: 100%; padding: 12px; margin-top: 15px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; }
        .clock-in { background: #2c7a4d; color: white; }
        .clock-out { background: #dc3545; color: white; }
        .staff-list { margin-top: 20px; border-top: 1px solid #ddd; padding-top: 15px; max-height: 400px; overflow-y: auto; }
        .staff-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .staff-name { font-weight: bold; }
        .staff-status { font-size: 12px; padding: 3px 10px; border-radius: 20px; }
        .status-present { background: #d4edda; color: #155724; }
        .status-absent { background: #f8d7da; color: #721c24; }
        .status-pending { background: #fff3cd; color: #856404; }
        .small-text { font-size: 12px; color: #666; margin-top: 10px; }
        .current-time { text-align: center; font-size: 28px; font-weight: bold; color: #2c7a4d; margin: 10px 0; }
        .reason-box { background: #fff3cd; padding: 10px; border-radius: 8px; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⏰ VBS Timesheet</h1>
        <p>Focal Point - Select staff and click Kam In / Kam Out</p>
        
        <div class="user-info">
            <span>👤 <span id="userName"></span></span>
            <button class="logout" onclick="logout()">Logout</button>
        </div>
        
        <div class="current-time" id="currentTime"></div>
        
        <label>Select Staff Name:</label>
        <select id="staffSelect" required>
            <option value="">-- Select Staff --</option>
        </select>
        
        <label>Date:</label>
        <input type="date" id="reportDate" required>
        
        <div id="lateReasonBox" class="reason-box">
            <label>📝 Reason for being late:</label>
            <textarea id="lateReason" rows="2" placeholder="e.g., Traffic, transport issue, personal matter"></textarea>
        </div>
        
        <div id="earlyReasonBox" class="reason-box">
            <label>📝 Reason for leaving early:</label>
            <textarea id="earlyReason" rows="2" placeholder="e.g., Sick, appointment, emergency"></textarea>
        </div>
        
        <button id="clockInBtn" class="clock-in" onclick="prepareClockIn()">✅ KAM IN - Clock In</button>
        <button id="clockOutBtn" class="clock-out" onclick="prepareClockOut()">❌ KAM OUT - Clock Out</button>
        
        <div class="staff-list">
            <strong>📋 Today's Staff Status</strong>
            <div id="staffStatusList">Loading...</div>
        </div>
        
        <div class="small-text">
            ⏰ Clock out requires manager approval for early leave<br>
            📊 CEO sees only approved timesheets
        </div>
    </div>
    
    <script>
        const SUPABASE_URL = 'https://pdwctzueksfuspwwumdy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkd2N0enVla3NmdXNwd3d1bWR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MTA3NDQsImV4cCI6MjA5MjM4Njc0NH0.Xi7MH3MLuxDx1FK6BKLJi-n47SQn-gPgWxq35NuRpZY';
        
        let currentFocalPoint = null;
        let currentFocalPointDivision = null;
        let currentFocalPointLocation = null;
        let selectedStaffName = null;
        
        function updateTime() {
            const now = new Date();
            document.getElementById('currentTime').innerHTML = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
        setInterval(updateTime, 1000);
        updateTime();
        
        async function checkAuth() {
            const token = localStorage.getItem('vbs_token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }
            
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                const userEmail = payload.email;
                
                const response = await fetch(`${SUPABASE_URL}/rest/v1/focal_points?email=eq.${userEmail}`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
                });
                const focalPoints = await response.json();
                
                if (focalPoints.length === 0) {
                    alert('Access denied. Only focal points can use this system.');
                    logout();
                    return;
                }
                
                currentFocalPoint = focalPoints[0].name;
                currentFocalPointDivision = focalPoints[0].division;
                currentFocalPointLocation = focalPoints[0].location;
                document.getElementById('userName').innerText = `${currentFocalPoint} (${currentFocalPointDivision})`;
                
                loadStaffList();
                loadTodayStatus();
            } catch (e) {
                logout();
            }
        }
        
        function logout() {
            localStorage.removeItem('vbs_token');
            window.location.href = 'login.html';
        }
        
        document.getElementById('reportDate').value = new Date().toISOString().split('T')[0];
        document.getElementById('reportDate').addEventListener('change', () => {
            loadTodayStatus();
            loadStaffList();
        });
        
        async function loadStaffList() {
            const token = localStorage.getItem('vbs_token');
            
            let url = `${SUPABASE_URL}/rest/v1/staff_list?is_active=eq.true&order=staff_name.asc`;
            
            if (currentFocalPointDivision === 'Provincial') {
                url += `&division=eq.${currentFocalPointDivision}&location=eq.${currentFocalPointLocation}`;
            } else {
                url += `&division=eq.${currentFocalPointDivision}`;
            }
            
            const response = await fetch(url, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
            });
            const staff = await response.json();
            
            const select = document.getElementById('staffSelect');
            select.innerHTML = '<option value="">-- Select Staff --</option>';
            for (let s of staff) {
                select.innerHTML += `<option value="${s.staff_name}">${s.staff_name}</option>`;
            }
        }
        
        async function loadTodayStatus() {
            const date = document.getElementById('reportDate').value;
            const token = localStorage.getItem('vbs_token');
            
            let url = `${SUPABASE_URL}/rest/v1/staff_list?is_active=eq.true&order=staff_name.asc`;
            if (currentFocalPointDivision === 'Provincial') {
                url += `&division=eq.${currentFocalPointDivision}&location=eq.${currentFocalPointLocation}`;
            } else {
                url += `&division=eq.${currentFocalPointDivision}`;
            }
            
            const staffResponse = await fetch(url, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
            });
            const allStaff = await staffResponse.json();
            
            if (allStaff.length === 0) {
                document.getElementById('staffStatusList').innerHTML = '<div style="padding:10px; text-align:center;">No staff assigned</div>';
                return;
            }
            
            const timesheetResponse = await fetch(`${SUPABASE_URL}/rest/v1/timesheet?report_date=eq.${date}&order=officer_name.asc`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
            });
            const records = await timesheetResponse.json();
            
            let presentCount = 0;
            let html = '';
            
            for (let staff of allStaff) {
                const record = records.find(r => r.officer_name === staff.staff_name);
                let statusText = 'ABSENT';
                let statusClass = 'status-absent';
                
                if (record && record.time_in && !record.time_out) {
                    statusText = `✅ PRESENT (IN: ${record.time_in})`;
                    if (record.late_reason) statusText += ` ⚠️ LATE`;
                    statusClass = 'status-present';
                    presentCount++;
                } else if (record && record.time_out) {
                    const isPending = record.status === 'PENDING';
                    statusText = `⏳ CLOCKED OUT (${record.hours_worked} hrs)`;
                    if (record.early_reason) statusText += ` ⚠️ EARLY`;
                    if (isPending) statusText += ` (Pending Approval)`;
                    statusClass = 'status-pending';
                }
                
                html += `
                    <div class="staff-item">
                        <span class="staff-name">${staff.staff_name}</span>
                        <span class="staff-status ${statusClass}">${statusText}</span>
                    </div>
                `;
            }
            
            document.getElementById('staffStatusList').innerHTML = html;
            document.querySelector('.staff-list strong').innerHTML = `📋 Today's Staff Status (${presentCount}/${allStaff.length} Present)`;
        }
        
        function prepareClockIn() {
            selectedStaffName = document.getElementById('staffSelect').value;
            if (!selectedStaffName) { alert('Select staff first'); return; }
            
            const now = new Date();
            const currentHour = now.getHours();
            const standardStartHour = 8;
            
            if (currentHour > standardStartHour || (currentHour === standardStartHour && now.getMinutes() > 15)) {
                document.getElementById('lateReasonBox').style.display = 'block';
                document.getElementById('earlyReasonBox').style.display = 'none';
                document.getElementById('clockInBtn').style.display = 'none';
                confirmLateBtn.style.display = 'block';
            } else {
                clockIn(selectedStaffName, null);
            }
        }
        
        function prepareClockOut() {
            selectedStaffName = document.getElementById('staffSelect').value;
            if (!selectedStaffName) { alert('Select staff first'); return; }
            
            const now = new Date();
            const currentHour = now.getHours();
            const standardEndHour = 17;
            
            if (currentHour < standardEndHour) {
                document.getElementById('earlyReasonBox').style.display = 'block';
                document.getElementById('lateReasonBox').style.display = 'none';
                document.getElementById('clockOutBtn').style.display = 'none';
                confirmEarlyBtn.style.display = 'block';
            } else {
                clockOut(selectedStaffName, null);
            }
        }
        
        async function confirmLateClockIn() {
            const reason = document.getElementById('lateReason').value;
            if (!reason) { alert('Please provide a reason for being late'); return; }
            clockIn(selectedStaffName, reason);
        }
        
        async function confirmEarlyClockOut() {
            const reason = document.getElementById('earlyReason').value;
            if (!reason) { alert('Please provide a reason for leaving early'); return; }
            clockOut(selectedStaffName, reason);
        }
        
        async function clockIn(staffName, lateReason) {
            const date = document.getElementById('reportDate').value;
            const token = localStorage.getItem('vbs_token');
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            
            const check = await fetch(`${SUPABASE_URL}/rest/v1/timesheet?officer_name=eq.${staffName}&report_date=eq.${date}`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
            });
            const existing = await check.json();
            
            if (existing.length > 0 && existing[0].time_in && !existing[0].time_out) {
                alert(`${staffName} is already clocked in today.`);
                resetForms();
                return;
            }
            
            const data = {
                officer_name: staffName,
                division: currentFocalPointDivision,
                report_date: date,
                time_in: timeStr,
                late_reason: lateReason || null,
                status: 'PENDING'
            };
            
            const response = await fetch(`${SUPABASE_URL}/rest/v1/timesheet`, {
                method: 'POST',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            
            if (response.ok) {
                const msg = lateReason ? `⚠️ ${staffName} clocked IN LATE at ${timeStr}\nReason: ${lateReason}` : `✅ ${staffName} clocked IN at ${timeStr}`;
                alert(msg);
                resetForms();
                loadTodayStatus();
                loadStaffList();
            } else {
                alert('Failed to clock in');
            }
        }
        
        async function clockOut(staffName, earlyReason) {
            const date = document.getElementById('reportDate').value;
            const token = localStorage.getItem('vbs_token');
            
            const response = await fetch(`${SUPABASE_URL}/rest/v1/timesheet?officer_name=eq.${staffName}&report_date=eq.${date}`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
            });
            const records = await response.json();
            
            if (records.length === 0) {
                alert(`${staffName} has no clock-in record today.`);
                resetForms();
                return;
            }
            
            const record = records[0];
            if (!record.time_in) { alert('No clock-in record found'); resetForms(); return; }
            if (record.time_out) { alert(`${staffName} already clocked out today`); resetForms(); return; }
            
            const now = new Date();
            const timeOutStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            
            const timeInParts = record.time_in.split(':');
            const timeOutParts = timeOutStr.split(':');
            let hours = parseInt(timeOutParts[0]) - parseInt(timeInParts[0]);
            let minutes = parseInt(timeOutParts[1]) - parseInt(timeInParts[1]);
            if (minutes < 0) { hours--; minutes += 60; }
            const totalHours = hours + minutes / 60;
            
            const update = await fetch(`${SUPABASE_URL}/rest/v1/timesheet?id=eq.${record.id}`, {
                method: 'PATCH',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    time_out: timeOutStr,
                    hours_worked: totalHours.toFixed(2),
                    early_reason: earlyReason || null,
                    status: 'PENDING'
                })
            });
            
            if (update.ok) {
                const msg = earlyReason ? `⚠️ ${staffName} clocked OUT EARLY at ${timeOutStr}\nHours: ${totalHours.toFixed(2)}\nReason: ${earlyReason}\nWaiting for manager approval` : `❌ ${staffName} clocked OUT at ${timeOutStr} | Hours: ${totalHours.toFixed(2)}`;
                alert(msg);
                resetForms();
                loadTodayStatus();
                loadStaffList();
            } else {
                alert('Failed to clock out');
            }
        }
        
        function resetForms() {
            document.getElementById('lateReasonBox').style.display = 'none';
            document.getElementById('earlyReasonBox').style.display = 'none';
            document.getElementById('clockInBtn').style.display = 'block';
            document.getElementById('clockOutBtn').style.display = 'block';
            confirmLateBtn.style.display = 'none';
            confirmEarlyBtn.style.display = 'none';
            document.getElementById('lateReason').value = '';
            document.getElementById('earlyReason').value = '';
            document.getElementById('staffSelect').value = '';
        }
        
        const confirmLateBtn = document.createElement('button');
        confirmLateBtn.id = 'confirmClockInBtn';
        confirmLateBtn.className = 'clock-in';
        confirmLateBtn.innerHTML = '⚠️ CONFIRM LATE CLOCK IN';
        confirmLateBtn.style.display = 'none';
        confirmLateBtn.onclick = confirmLateClockIn;
        document.querySelector('.container').appendChild(confirmLateBtn);
        
        const confirmEarlyBtn = document.createElement('button');
        confirmEarlyBtn.id = 'confirmClockOutBtn';
        confirmEarlyBtn.className = 'clock-out';
        confirmEarlyBtn.innerHTML = '⚠️ CONFIRM EARLY CLOCK OUT';
        confirmEarlyBtn.style.display = 'none';
        confirmEarlyBtn.onclick = confirmEarlyClockOut;
        document.querySelector('.container').appendChild(confirmEarlyBtn);
        
        checkAuth();
    </script>
</body>
</html>
