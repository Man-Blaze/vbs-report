<!DOCTYPE html>
<html>
<head>
    <title>VBS Timesheet - Clock In/Out</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial; max-width: 500px; margin: 20px auto; padding: 20px; background: #f5f5f5; }
        .container { background: white; padding: 20px; border-radius: 10px; }
        h1 { color: #2c7a4d; }
        button { width: 100%; padding: 15px; margin: 10px 0; font-size: 18px; border: none; border-radius: 8px; cursor: pointer; }
        .clock-in { background: #2c7a4d; color: white; }
        .clock-out { background: #dc3545; color: white; }
        .status { text-align: center; padding: 10px; background: #e8f5e9; border-radius: 8px; margin: 15px 0; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; }
        .record-card { background: #f8f9fa; padding: 10px; border-radius: 8px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⏰ VBS Timesheet</h1>
        <p>Clock in when you start work. Clock out when you finish.</p>
        
        <div class="status" id="statusMsg">Ready to clock in</div>
        
        <form id="timesheetForm">
            <label>Officer Name:</label>
            <input name="officer_name" id="officerName" required>
            
            <label>Division:</label>
            <select name="division" id="division" required>
                <option value="Provincial">Provincial</option>
                <option value="Laboratory">Laboratory</option>
                <option value="Packhouse">Packhouse</option>
                <option value="Standards">Standards</option>
                <option value="Administration">Administration</option>
            </select>
            
            <label>Date:</label>
            <input name="report_date" type="date" id="reportDate" required>
            
            <label>Location (optional):</label>
            <input name="location" placeholder="e.g., Office, Santo, Port Vila">
            
            <input type="hidden" name="time_in" id="timeIn">
            <input type="hidden" name="time_out" id="timeOut">
            <input type="hidden" name="hours_worked" id="hoursWorked">
            <input type="hidden" name="record_id" id="recordId">
            
            <button type="button" class="clock-in" onclick="clockIn()">✅ Clock In - Start Work</button>
            <button type="button" class="clock-out" onclick="clockOut()">❌ Clock Out - End Work</button>
        </form>
        
        <div id="todayRecord" class="record-card"></div>
        <div id="weeklySummary" class="record-card" style="margin-top: 10px;"></div>
    </div>
    
    <script>
        const SUPABASE_URL = 'https://pdwctzueksfuspwwumdy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkd2N0enVla3NmdXNwd3d1bWR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MTA3NDQsImV4cCI6MjA5MjM4Njc0NH0.Xi7MH3MLuxDx1FK6BKLJi-n47SQn-gPgWxq35NuRpZY';
        
        let currentRecordId = null;
        
        // Set default date
        document.getElementById('reportDate').value = new Date().toISOString().split('T')[0];
        
        // Load saved officer name
        if (localStorage.getItem('vbs_officer')) {
            document.getElementById('officerName').value = localStorage.getItem('vbs_officer');
        }
        
        document.getElementById('officerName').onchange = () => {
            localStorage.setItem('vbs_officer', document.getElementById('officerName').value);
            loadTodayRecord();
        };
        document.getElementById('division').onchange = () => loadTodayRecord();
        document.getElementById('reportDate').onchange = () => loadTodayRecord();
        
        async function clockIn() {
            const officer = document.getElementById('officerName').value;
            if (!officer) { alert('Enter your name first'); return; }
            
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            const date = document.getElementById('reportDate').value;
            
            document.getElementById('timeIn').value = timeStr;
            document.getElementById('statusMsg').innerHTML = `✅ Clocked in at ${timeStr}`;
            document.getElementById('statusMsg').style.background = '#d4edda';
            
            const data = {
                officer_name: officer,
                division: document.getElementById('division').value,
                report_date: date,
                time_in: timeStr,
                location: document.querySelector('[name="location"]').value,
                status: 'PENDING'
            };
            
            const response = await fetch(`${SUPABASE_URL}/rest/v1/timesheet`, {
                method: 'POST',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            
            const result = await response.json();
            currentRecordId = result[0]?.id;
            document.getElementById('recordId').value = currentRecordId;
            
            loadTodayRecord();
            loadWeeklySummary();
        }
        
        async function clockOut() {
            const officer = document.getElementById('officerName').value;
            if (!officer) { alert('Enter your name first'); return; }
            
            // First get today's record
            const date = document.getElementById('reportDate').value;
            const division = document.getElementById('division').value;
            
            const response = await fetch(`${SUPABASE_URL}/rest/v1/timesheet?officer_name=eq.${officer}&report_date=eq.${date}&division=eq.${division}&order=created_at.desc&limit=1`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            const records = await response.json();
            
            if (records.length === 0) {
                alert('No clock-in record found. Please clock in first.');
                return;
            }
            
            const now = new Date();
            const timeOutStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('timeOut').value = timeOutStr;
            
            // Calculate hours
            if (records[0].time_in) {
                const timeInParts = records[0].time_in.split(':');
                const timeOutParts = timeOutStr.split(':');
                const inDate = new Date();
                inDate.setHours(parseInt(timeInParts[0]), parseInt(timeInParts[1]), 0);
                const outDate = new Date();
                outDate.setHours(parseInt(timeOutParts[0]), parseInt(timeOutParts[1]), 0);
                const hours = (outDate - inDate) / 3600000;
                document.getElementById('hoursWorked').value = hours.toFixed(1);
            }
            
            document.getElementById('statusMsg').innerHTML = `❌ Clocked out at ${timeOutStr} | Hours: ${document.getElementById('hoursWorked').value}`;
            document.getElementById('statusMsg').style.background = '#f8d7da';
            
            await fetch(`${SUPABASE_URL}/rest/v1/timesheet?id=eq.${records[0].id}`, {
                method: 'PATCH',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    time_out: timeOutStr, 
                    hours_worked: parseFloat(document.getElementById('hoursWorked').value),
                    status: 'PENDING'
                })
            });
            
            loadTodayRecord();
            loadWeeklySummary();
        }
        
        async function loadTodayRecord() {
            const officer = document.getElementById('officerName').value;
            const date = document.getElementById('reportDate').value;
            const division = document.getElementById('division').value;
            
            if (!officer) return;
            
            const response = await fetch(`${SUPABASE_URL}/rest/v1/timesheet?officer_name=eq.${officer}&report_date=eq.${date}&division=eq.${division}&order=created_at.desc&limit=1`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            const records = await response.json();
            
            if (records.length > 0) {
                const r = records[0];
                document.getElementById('recordId').value = r.id;
                document.getElementById('todayRecord').innerHTML = `
                    <strong>📅 Today's Record (${date})</strong><br>
                    Clock In: ${r.time_in || '—'}<br>
                    Clock Out: ${r.time_out || '—'}<br>
                    Hours: ${r.hours_worked || '—'}<br>
                    Status: ${r.status || 'PENDING'}
                `;
            } else {
                document.getElementById('todayRecord').innerHTML = 'No record for today. Click Clock In.';
            }
        }
        
        async function loadWeeklySummary() {
            const officer = document.getElementById('officerName').value;
            if (!officer) return;
            
            // Get last 7 days
            const response = await fetch(`${SUPABASE_URL}/rest/v1/timesheet?officer_name=eq.${officer}&order=report_date.desc&limit=7`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            const records = await response.json();
            
            if (records.length === 0) {
                document.getElementById('weeklySummary').innerHTML = 'No records this week.';
                return;
            }
            
            let totalHours = 0;
            let html = '<strong>📊 Last 7 Days</strong><br>';
            for (let r of records) {
                const hours = r.hours_worked || 0;
                totalHours += hours;
                html += `${r.report_date}: ${hours} hours<br>`;
            }
            html += `<strong>Total: ${totalHours.toFixed(1)} hours</strong>`;
            document.getElementById('weeklySummary').innerHTML = html;
        }
        
        // Initial load
        loadTodayRecord();
        loadWeeklySummary();
    </script>
</body>
</html>
