<!DOCTYPE html>
<html>
<head>
    <title>VBS - Administration Report</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial; max-width: 600px; margin: 20px auto; padding: 20px; background: #f5f5f5; }
        .container { background: white; padding: 20px; border-radius: 10px; }
        h1 { color: #2c7a4d; }
        h3 { color: #1a5a3a; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
        label { display: block; margin-top: 12px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 20px; background: #2c7a4d; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .section { margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px; }
        .row { display: flex; gap: 15px; }
        .row > div { flex: 1; }
        @media (max-width: 600px) { .row { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 Administration Report</h1>
        <p>Financial, Supplies, Vehicles, and Operational Reports</p>
        
        <form id="adminForm">
            <!-- BASIC INFO -->
            <div class="section">
                <h3>👤 Reporter Information</h3>
                <div class="row">
                    <div><label>Officer Name:</label><input name="officer_name" id="officerName" required></div>
                    <div><label>Report Date:</label><input name="report_date" type="date" required></div>
                </div>
                <label>Division:</label>
                <select name="division">
                    <option>Administration</option><option>Provincial</option><option>Laboratory</option>
                    <option>Packhouse</option><option>Standards</option>
                </select>
            </div>
            
            <!-- FINANCIAL -->
            <div class="section">
                <h3>💰 Financial</h3>
                <div class="row">
                    <div><label>Budget Utilization (%):</label><input name="budget_utilization_percent" type="number" step="0.1"></div>
                    <div><label>Revenue Collected (VT):</label><input name="revenue_collected_vt" type="number" value="0"></div>
                </div>
                <div class="row">
                    <div><label>Program Spending (VT):</label><input name="program_spending_vt" type="number" value="0"></div>
                    <div><label>Certification Fees Collected:</label><input name="certification_fees" type="number" value="0"></div>
                </div>
            </div>
            
            <!-- SUPPLIES -->
            <div class="section">
                <h3>📦 Supplies Request</h3>
                <div class="row">
                    <div><label>Item Name:</label><input name="supply_item_name"></div>
                    <div><label>Quantity:</label><input name="supply_quantity" type="number"></div>
                </div>
                <div class="row">
                    <div><label>Unit:</label><select name="supply_unit"><option>Box</option><option>Ream</option><option>Liter</option><option>Each</option></select></div>
                    <div><label>Urgency:</label><select name="supply_urgency"><option>Low</option><option>Medium</option><option>High</option></select></div>
                </div>
                <label>Justification:</label><textarea name="supply_justification" rows="2"></textarea>
            </div>
            
            <!-- VEHICLE -->
            <div class="section">
                <h3>🚗 Vehicle Request</h3>
                <div class="row">
                    <div><label>Destination:</label><input name="vehicle_destination"></div>
                    <div><label>Purpose:</label><input name="vehicle_purpose"></div>
                </div>
                <div class="row">
                    <div><label>Date Needed:</label><input name="vehicle_date" type="date"></div>
                    <div><label>Return Date:</label><input name="vehicle_return" type="date"></div>
                </div>
            </div>
            
            <!-- STAFF & OPERATIONS -->
            <div class="section">
                <h3>👥 Staff & Operations</h3>
                <div class="row">
                    <div><label>Hours Worked:</label><input name="hours_worked" type="number" step="0.5" value="8"></div>
                    <div><label>Tasks Completed:</label><input name="tasks_completed" type="number" value="0"></div>
                </div>
                <div class="row">
                    <div><label>Overtime Hours:</label><input name="overtime_hours" type="number" step="0.5" value="0"></div>
                    <div><label>Staff on Leave:</label><input name="staff_on_leave" type="number" value="0"></div>
                </div>
                <label>Notes / Issues:</label><textarea name="inspector_notes" rows="3" placeholder="Any operational issues, staff concerns, or notable events"></textarea>
            </div>
            
            <button type="submit">Submit Admin Report</button>
        </form>
        <div id="message"></div>
    </div>
    
    <script>
        const SUPABASE_URL = 'https://pdwctzueksfuspwwumdy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkd2N0enVla3NmdXNwd3d1bWR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MTA3NDQsImV4cCI6MjA5MjM4Njc0NH0.Xi7MH3MLuxDx1FK6BKLJi-n47SQn-gPgWxq35NuRpZY';
        
        document.getElementById('report_date').valueAsDate = new Date();
        
        document.getElementById('officerName').addEventListener('change', function() {
            localStorage.setItem('admin_name', this.value);
        });
        const savedName = localStorage.getItem('admin_name');
        if (savedName) document.getElementById('officerName').value = savedName;
        
        document.getElementById('adminForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = {};
            formData.forEach((v,k) => { if(v) data[k] = v; });
            data.status = 'PENDING';
            
            const response = await fetch(`${SUPABASE_URL}/rest/v1/administration_reports`, {
                method: 'POST',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            alert(response.ok ? '✅ Admin report submitted!' : '❌ Error');
            if(response.ok) e.target.reset();
        };
    </script>
</body>
</html>
