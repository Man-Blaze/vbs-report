<!DOCTYPE html>
<html>
<head>
    <title>VBS - Inspection Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; background: #f0f2f5; }
        .container { max-width: 800px; margin: 0 auto; }
        
        .header { background: linear-gradient(135deg, #1a5a3a, #0d3b24); color: white; padding: 20px; border-radius: 16px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .header h1 { margin: 0; font-size: 24px; display: flex; align-items: center; gap: 10px; }
        .logout { background: #dc3545; color: white; border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; }
        
        .form-card { background: white; border-radius: 20px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .form-title { font-size: 18px; font-weight: bold; color: #1a5a3a; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #e2e8f0; display: flex; align-items: center; gap: 10px; }
        
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px; margin-bottom: 16px; }
        .field-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-weight: 600; font-size: 13px; color: #334155; }
        label i { color: #2c7a4d; width: 20px; }
        input, select, textarea { padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 12px; font-size: 14px; font-family: inherit; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #2c7a4d; }
        
        .form-selector { display: flex; gap: 12px; flex-wrap: wrap; margin: 20px 0; }
        .form-btn { flex: 1; padding: 12px; border: 2px solid #e2e8f0; background: white; border-radius: 12px; cursor: pointer; text-align: center; transition: all 0.2s; }
        .form-btn.active { border-color: #2c7a4d; background: #e8f5e9; }
        .form-btn i { font-size: 24px; display: block; margin-bottom: 8px; color: #1a5a3a; }
        .form-btn span { font-size: 13px; font-weight: 500; }
        
        .inspection-form { display: none; margin-top: 20px; padding-top: 20px; border-top: 1px solid #e2e8f0; }
        .inspection-form.active-form { display: block; }
        
        button.submit-btn { width: 100%; padding: 14px; background: #2c7a4d; color: white; border: none; border-radius: 40px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        button.submit-btn:hover { background: #1e5a38; }
        
        .message { margin-top: 20px; padding: 12px; border-radius: 12px; display: none; text-align: center; font-weight: 500; }
        .success { background: #d4edda; color: #155724; border-left: 4px solid #28a745; }
        .error { background: #f8d7da; color: #721c24; border-left: 4px solid #dc3545; }
        
        .footer { text-align: center; margin-top: 20px; font-size: 11px; color: #888; }
        .required-star::after { content: "*"; color: #dc3545; margin-left: 4px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-clipboard-list"></i> VBS Inspection Portal</h1>
        <div class="user-info">
            <span>👤 <span id="userName">Inspector</span></span>
            <button class="logout" onclick="logout()">Logout</button>
        </div>
    </div>
    
    <div class="form-card">
        <div class="form-title"><i class="fas fa-id-card"></i> Inspector Information</div>
        
        <div class="form-row">
            <div class="field-group"><label><i class="fas fa-user"></i> Inspector Name <span class="required-star">*</span></label><input type="text" id="inspectorName" placeholder="Full name"></div>
            <div class="field-group"><label><i class="fas fa-id-badge"></i> Inspector ID / Badge Number</label><input type="text" id="inspectorId" placeholder="e.g., VBS-0123"></div>
            <div class="field-group"><label><i class="fas fa-calendar"></i> Inspection Date</label><input type="date" id="inspectionDate"></div>
        </div>
        
        <div class="form-row">
            <div class="field-group"><label><i class="fas fa-building"></i> Division</label>
                <select id="division">
                    <option value="Provincial">🌾 Provincial</option>
                    <option value="Laboratory">🔬 Laboratory</option>
                    <option value="Packhouse">📦 Packhouse</option>
                    <option value="Metrology">⚖️ Metrology</option>
                    <option value="Standards">📜 Standards</option>
                    <option value="Conformity">✅ Conformity</option>
                </select>
            </div>
            <div class="field-group"><label><i class="fas fa-map-marker-alt"></i> Location</label><input type="text" id="location" placeholder="e.g., Port Vila, Luganville"></div>
        </div>
    </div>
    
    <div class="form-card">
        <div class="form-title"><i class="fas fa-file-alt"></i> Select Inspection Type</div>
        
        <div class="form-selector" id="formSelector">
            <div class="form-btn" data-form="general">
                <i class="fas fa-clipboard"></i>
                <span>General Inspection</span>
            </div>
            <div class="form-btn" data-form="fuel">
                <i class="fas fa-gas-pump"></i>
                <span>Fuel Dispenser</span>
            </div>
            <div class="form-btn" data-form="food">
                <i class="fas fa-apple-alt"></i>
                <span>Food Products</span>
            </div>
            <div class="form-btn" data-form="packhouse">
                <i class="fas fa-boxes"></i>
                <span>Packhouse</span>
            </div>
            <div class="form-btn" data-form="farm">
                <i class="fas fa-tractor"></i>
                <span>Farm</span>
            </div>
        </div>
        
        <!-- GENERAL INSPECTION FORM -->
        <div id="generalForm" class="inspection-form active-form">
            <div class="form-row">
                <div class="field-group"><label>Entity/Business Name</label><input type="text" id="general_entity_name" placeholder="Business name"></div>
                <div class="field-group"><label>Entity Type</label>
                    <select id="general_entity_type">
                        <option value="Retailer">Retailer</option>
                        <option value="Wholesaler">Wholesaler</option>
                        <option value="Farm">Farm</option>
                        <option value="Importer">Importer</option>
                        <option value="Processor">Processor</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="field-group"><label>Assessment Result</label>
                    <select id="general_result">
                        <option value="Compliant">✅ Compliant - Passed</option>
                        <option value="Non-Compliant">❌ Non-Compliant - Failed</option>
                        <option value="Partial">⚠️ Partial Compliance</option>
                    </select>
                </div>
                <div class="field-group"><label>Non-Compliance Type</label>
                    <select id="general_nc_type">
                        <option value="">None</option>
                        <option value="Labeling">Labeling Issue</option>
                        <option value="Expiry">Expired Product</option>
                        <option value="Storage">Storage/Hygiene Issue</option>
                        <option value="Documentation">Missing Documentation</option>
                    </select>
                </div>
            </div>
            <div class="field-group"><label>Non-Compliance Description</label><textarea id="general_nc_desc" rows="2"></textarea></div>
            <div class="form-row">
                <div class="field-group"><label>Enforcement Action</label>
                    <select id="general_action">
                        <option value="">None</option>
                        <option value="Warning">Verbal Warning</option>
                        <option value="Written">Written Notice</option>
                        <option value="Seizure">Product Seized</option>
                        <option value="Closure">Temporary Closure</option>
                    </select>
                </div>
                <div class="field-group"><label>GPS Coordinates</label><input type="text" id="general_gps" placeholder="-15.283, 166.917"></div>
            </div>
            <div class="field-group"><label>Inspector Notes</label><textarea id="general_notes" rows="2"></textarea></div>
        </div>
        
        <!-- FUEL DISPENSER FORM -->
        <div id="fuelForm" class="inspection-form">
            <div class="form-row">
                <div class="field-group"><label>Station Name</label><input type="text" id="fuel_station" placeholder="e.g., Pacific Fuel"></div>
                <div class="field-group"><label>Pump Number</label><input type="text" id="fuel_pump" placeholder="Pump #3"></div>
            </div>
            <div class="form-row">
                <div class="field-group"><label>Dispenser Brand</label><input type="text" id="fuel_brand" placeholder="Gilbarco, Wayne"></div>
                <div class="field-group"><label>Model Number</label><input type="text" id="fuel_model" placeholder="G500"></div>
            </div>
            <div class="form-row">
                <div class="field-group"><label>Nominal Test Volume</label>
                    <select id="fuel_volume">
                        <option value="15">15 Litre Measure</option>
                        <option value="200">200 Litre Measure</option>
                    </select>
                </div>
                <div class="field-group"><label>Ambient Temperature (°C)</label><input type="number" id="fuel_temp" step="0.1"></div>
            </div>
            <div class="form-row">
                <div class="field-group"><label>Pump Indicated Volume (L)</label><input type="number" id="fuel_pump_vol" step="0.01"></div>
                <div class="field-group"><label>Measure Indicated Volume (L)</label><input type="number" id="fuel_measure_vol" step="0.01"></div>
            </div>
            <div class="form-row">
                <div class="field-group"><label>Pass / Fail</label>
                    <select id="fuel_result">
                        <option value="Pass">✅ Pass</option>
                        <option value="Fail">❌ Fail</option>
                    </select>
                </div>
                <div class="field-group"><label>Action Taken</label>
                    <select id="fuel_action">
                        <option value="Pass - No action">Pass - No action</option>
                        <option value="Warning issued">Warning issued</option>
                        <option value="Seal affixed">Seal affixed</option>
                        <option value="Tagged out">Tagged out of service</option>
                    </select>
                </div>
            </div>
            <div class="field-group"><label>Comments</label><textarea id="fuel_comments" rows="2"></textarea></div>
        </div>
        
        <!-- FOOD PRODUCTS FORM -->
        <div id="foodForm" class="inspection-form">
            <div class="form-row">
                <div class="field-group"><label>Product Name</label><input type="text" id="food_product" placeholder="Product name"></div>
                <div class="field-group"><label>Batch/Lot Number</label><input type="text" id="food_batch" placeholder="Batch #"></div>
            </div>
            <div class="form-row">
                <div class="field-group"><label>Manufacturer</label><input type="text" id="food_manufacturer"></div>
                <div class="field-group"><label>Expiry Date</label><input type="date" id="food_expiry"></div>
            </div>
            <div class="form-row">
                <div class="field-group"><label>Compliance Status</label>
                    <select id="food_status">
                        <option value="Compliant">✅ Compliant</option>
                        <option value="Non-Compliant">❌ Non-Compliant</option>
                    </select>
                </div>
                <div class="field-group"><label>Issue Type</label><input type="text" id="food_issue" placeholder="e.g., Labeling, Contamination"></div>
            </div>
            <div class="field-group"><label>Action Taken</label><textarea id="food_action" rows="2"></textarea></div>
        </div>
        
        <!-- PACKHOUSE FORM -->
        <div id="packhouseForm" class="inspection-form">
            <div class="form-row">
                <div class="field-group"><label>Packhouse Name</label><input type="text" id="pack_name" placeholder="Packhouse name"></div>
                <div class="field-group"><label>Volume Processed (kg)</label><input type="number" id="pack_volume" step="0.01"></div>
            </div>
            <div class="form-row">
                <div class="field-group"><label>Waste (%)</label><input type="number" id="pack_waste" step="0.1"></div>
                <div class="field-group"><label>Staff on Duty</label><input type="number" id="pack_staff"></div>
            </div>
            <div class="form-row">
                <div class="field-group"><label>Cold Room Temp (°C)</label><input type="number" id="pack_temp" step="0.1"></div>
                <div class="field-group"><label>Compliance Status</label>
                    <select id="pack_status">
                        <option value="Compliant">✅ Compliant</option>
                        <option value="Non-Compliant">❌ Non-Compliant</option>
                    </select>
                </div>
            </div>
            <div class="field-group"><label>Notes</label><textarea id="pack_notes" rows="2"></textarea></div>
        </div>
        
        <!-- FARM FORM -->
        <div id="farmForm" class="inspection-form">
            <div class="form-row">
                <div class="field-group"><label>Farm Name</label><input type="text" id="farm_name"></div>
                <div class="field-group"><label>Farmer Name</label><input type="text" id="farm_farmer"></div>
            </div>
            <div class="form-row">
                <div class="field-group"><label>Crop Type</label><input type="text" id="farm_crop"></div>
                <div class="field-group"><label>Area (hectares)</label><input type="number" id="farm_area" step="0.1"></div>
            </div>
            <div class="form-row">
                <div class="field-group"><label>Compliance Status</label>
                    <select id="farm_status">
                        <option value="Compliant">✅ Compliant</option>
                        <option value="Non-Compliant">❌ Non-Compliant</option>
                    </select>
                </div>
                <div class="field-group"><label>Issues Found</label><input type="text" id="farm_issues"></div>
            </div>
            <div class="field-group"><label>Recommendations</label><textarea id="farm_recommendations" rows="2"></textarea></div>
        </div>
        
        <button class="submit-btn" onclick="submitInspection()"><i class="fas fa-paper-plane"></i> Submit Inspection Report</button>
        <div id="message" class="message"></div>
    </div>
    
    <div class="footer">
        📋 All inspection records saved to Supabase | Audit ready<br>
        🔒 Inspector ID and name logged with every submission
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>
<script>
    const SUPABASE_URL = 'https://pdwctzueksfuspwwumdy.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkd2N0enVla3NmdXNwd3d1bWR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MTA3NDQsImV4cCI6MjA5MjM4Njc0NH0.Xi7MH3MLuxDx1FK6BKLJi-n47SQn-gPgWxq35NuRpZY';
    
    let supabase = null;
    let currentForm = 'general';
    
    // Set today's date
    document.getElementById('inspectionDate').value = new Date().toISOString().split('T')[0];
    
    // Form selector handler
    document.querySelectorAll('.form-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.form-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentForm = btn.dataset.form;
            document.querySelectorAll('.inspection-form').forEach(form => form.classList.remove('active-form'));
            document.getElementById(`${currentForm}Form`).classList.add('active-form');
        });
    });
    
    // Get inspector name from localStorage if available
    const savedName = localStorage.getItem('inspector_name');
    if (savedName) document.getElementById('inspectorName').value = savedName;
    
    function getFormData() {
        const inspectorName = document.getElementById('inspectorName').value;
        const inspectorId = document.getElementById('inspectorId').value;
        const inspectionDate = document.getElementById('inspectionDate').value;
        const division = document.getElementById('division').value;
        const location = document.getElementById('location').value;
        
        if (!inspectorName) {
            alert('Please enter Inspector Name');
            return null;
        }
        
        localStorage.setItem('inspector_name', inspectorName);
        
        const baseData = {
            inspector_name: inspectorName,
            inspector_id: inspectorId,
            inspection_date: inspectionDate,
            division: division,
            location: location,
            inspection_type: currentForm,
            created_at: new Date().toISOString(),
            status: 'PENDING'
        };
        
        // Collect form-specific data
        if (currentForm === 'general') {
            return {
                ...baseData,
                entity_name: document.getElementById('general_entity_name').value,
                entity_type: document.getElementById('general_entity_type').value,
                assessment_result: document.getElementById('general_result').value,
                non_compliance_type: document.getElementById('general_nc_type').value,
                non_compliance_description: document.getElementById('general_nc_desc').value,
                enforcement_action: document.getElementById('general_action').value,
                gps_coordinates: document.getElementById('general_gps').value,
                inspector_notes: document.getElementById('general_notes').value,
                table_name: 'conformity_assessment'
            };
        } else if (currentForm === 'fuel') {
            const pumpVol = parseFloat(document.getElementById('fuel_pump_vol').value);
            const measureVol = parseFloat(document.getElementById('fuel_measure_vol').value);
            let errorML = null;
            if (!isNaN(pumpVol) && !isNaN(measureVol) && measureVol !== 0) {
                errorML = ((pumpVol - measureVol) / measureVol) * 100;
            }
            return {
                ...baseData,
                station_name: document.getElementById('fuel_station').value,
                pump_number: document.getElementById('fuel_pump').value,
                dispenser_brand: document.getElementById('fuel_brand').value,
                model_number: document.getElementById('fuel_model').value,
                nominal_volume: document.getElementById('fuel_volume').value,
                ambient_temp: document.getElementById('fuel_temp').value,
                pump_volume: pumpVol,
                measure_volume: measureVol,
                error_percent: errorML,
                pass_fail: document.getElementById('fuel_result').value,
                action_taken: document.getElementById('fuel_action').value,
                comments: document.getElementById('fuel_comments').value,
                table_name: 'fuel_dispenser_inspections'
            };
        } else if (currentForm === 'food') {
            return {
                ...baseData,
                product_name: document.getElementById('food_product').value,
                batch_number: document.getElementById('food_batch').value,
                manufacturer: document.getElementById('food_manufacturer').value,
                expiry_date: document.getElementById('food_expiry').value,
                compliance_status: document.getElementById('food_status').value,
                issue_type: document.getElementById('food_issue').value,
                action_taken: document.getElementById('food_action').value,
                table_name: 'food_inspections'
            };
        } else if (currentForm === 'packhouse') {
            return {
                ...baseData,
                packhouse_name: document.getElementById('pack_name').value,
                volume_processed_kg: document.getElementById('pack_volume').value,
                waste_percent: document.getElementById('pack_waste').value,
                staff_on_duty: document.getElementById('pack_staff').value,
                cold_room_temp_c: document.getElementById('pack_temp').value,
                compliance_status: document.getElementById('pack_status').value,
                inspector_notes: document.getElementById('pack_notes').value,
                table_name: 'packhouse_inspections'
            };
        } else if (currentForm === 'farm') {
            return {
                ...baseData,
                farm_name: document.getElementById('farm_name').value,
                farmer_name: document.getElementById('farm_farmer').value,
                crop_type: document.getElementById('farm_crop').value,
                area_hectares: document.getElementById('farm_area').value,
                compliance_status: document.getElementById('farm_status').value,
                issues_found: document.getElementById('farm_issues').value,
                recommendations: document.getElementById('farm_recommendations').value,
                table_name: 'farm_inspections'
            };
        }
        return baseData;
    }
    
    async function submitInspection() {
        const data = getFormData();
        if (!data) return;
        
        const tableName = data.table_name;
        delete data.table_name;
        
        const messageDiv = document.getElementById('message');
        
        try {
            if (!supabase) supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            
            const { error } = await supabase.from(tableName).insert([data]);
            
            if (error) throw error;
            
            messageDiv.innerHTML = `✅ Inspection report (${currentForm}) submitted successfully!`;
            messageDiv.className = 'message success';
            messageDiv.style.display = 'block';
            
            // Reset current form fields
            if (currentForm === 'general') {
                document.getElementById('general_entity_name').value = '';
                document.getElementById('general_nc_desc').value = '';
                document.getElementById('general_notes').value = '';
            } else if (currentForm === 'fuel') {
                document.getElementById('fuel_station').value = '';
                document.getElementById('fuel_pump').value = '';
                document.getElementById('fuel_pump_vol').value = '';
                document.getElementById('fuel_measure_vol').value = '';
                document.getElementById('fuel_comments').value = '';
            } else if (currentForm === 'food') {
                document.getElementById('food_product').value = '';
                document.getElementById('food_batch').value = '';
                document.getElementById('food_action').value = '';
            } else if (currentForm === 'packhouse') {
                document.getElementById('pack_name').value = '';
                document.getElementById('pack_notes').value = '';
            } else if (currentForm === 'farm') {
                document.getElementById('farm_name').value = '';
                document.getElementById('farm_recommendations').value = '';
            }
            
            setTimeout(() => { messageDiv.style.display = 'none'; }, 5000);
            
        } catch (err) {
            console.error('Error:', err);
            messageDiv.innerHTML = `❌ Error: ${err.message}`;
            messageDiv.className = 'message error';
            messageDiv.style.display = 'block';
        }
    }
    
    async function logout() {
        if (supabase) await supabase.auth.signOut();
        localStorage.clear();
        window.location.href = 'login.html';
    }
    
    window.addEventListener('DOMContentLoaded', () => {
        if (window.supabase) supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const token = localStorage.getItem('vbs_token');
        const userEmail = localStorage.getItem('vbs_user');
        if (token && userEmail) {
            document.getElementById('userName').innerHTML = userEmail.split('@')[0];
        } else {
            document.getElementById('userName').innerHTML = 'Inspector';
        }
    });
    
    window.submitInspection = submitInspection;
    window.logout = logout;
</script>
</body>
</html>
