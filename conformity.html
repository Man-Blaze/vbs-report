<!DOCTYPE html>
<html>
<head>
    <title>VBS - Inspection</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial, sans-serif; max-width: 550px; margin: 20px auto; padding: 20px; background: #f5f5f5; }
        .container { background: white; padding: 20px; border-radius: 10px; }
        h1 { color: #2c7a4d; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        textarea { min-height: 80px; }
        button { width: 100%; padding: 12px; margin-top: 20px; background: #2c7a4d; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        hr { margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>✅ Inspection</h1>
        <p>For inspectors doing compliance checks (retail, packhouse, farms, imports)</p>
        
        <form id="reportForm">
            <label>Officer Name:</label>
            <input name="officer_name" required>
            
            <label>Report Date:</label>
            <input name="report_date" type="date" required>
            
            <label>Inspection Type:</label>
            <select name="inspection_type" required>
                <option value="">Select</option>
                <option value="Retail">Retail Store Check</option>
                <option value="Packhouse">Packhouse Inspection</option>
                <option value="Farm">Farm Inspection</option>
                <option value="Import">Import Check</option>
                <option value="Warehouse">Warehouse Check</option>
                <option value="Other">Other</option>
            </select>
            
            <label>Location:</label>
            <input name="location" placeholder="e.g., Luganville Market, Big Bay Farm" required>
            
            <label>GPS Coordinates:</label>
            <input name="gps_coordinates" placeholder="e.g., -15.283, 166.917">
            
            <label>Entity Name:</label>
            <input name="entity_name" placeholder="Business or farm name">
            
            <label>Entity Type:</label>
            <select name="entity_type">
                <option value="Retailer">Retailer</option>
                <option value="Wholesaler">Wholesaler</option>
                <option value="Farm">Farm</option>
                <option value="Importer">Importer</option>
                <option value="Processor">Processor</option>
                <option value="Exporter">Exporter</option>
            </select>
            
            <label>Assessment Result:</label>
            <select name="assessment_result" required>
                <option value="Compliant">✅ Compliant - Passed</option>
                <option value="Non-Compliant">❌ Non-Compliant - Failed</option>
                <option value="Partial">⚠️ Partial Compliance</option>
            </select>
            
            <label>Non-Compliance Type (if any):</label>
            <select name="non_compliance_type">
                <option value="">None</option>
                <option value="Labeling">Labeling Issue</option>
                <option value="Expiry">Expired Product</option>
                <option value="Storage">Storage/Hygiene Issue</option>
                <option value="Documentation">Missing Documentation</option>
                <option value="Pest">Pest Infestation</option>
                <option value="Temperature">Temperature Breach</option>
                <option value="Other">Other</option>
            </select>
            
            <label>Non-Compliance Description:</label>
            <textarea name="non_compliance_description" placeholder="Describe the issue"></textarea>
            
            <label>Total Items Checked:</label>
            <input name="total_items_checked" type="number" value="0">
            
            <label>Compliant Items:</label>
            <input name="compliant_items" type="number" value="0">
            
            <label>Non-Compliant Items:</label>
            <input name="non_compliant_items" type="number" value="0">
            
            <label>Enforcement Action Taken:</label>
            <select name="enforcement_action">
                <option value="">None</option>
                <option value="Warning">Verbal Warning</option>
                <option value="Written">Written Notice</option>
                <option value="Seizure">Product Seized</option>
                <option value="Closure">Temporary Closure</option>
                <option value="Fine">Fine Issued</option>
            </select>
            
            <label>Follow-up Required?</label>
            <select name="follow_up_required">
                <option value="false">No</option>
                <option value="true">Yes</option>
            </select>
            
            <label>Follow-up Date:</label>
            <input name="follow_up_date" type="date">
            
            <label>Inspector Notes:</label>
            <textarea name="inspector_notes" placeholder="Any additional observations"></textarea>
            
            <label>Hours Worked (total today):</label>
            <input name="hours_worked" type="number" step="0.5" value="8">
            
            <label>Time In:</label>
            <input name="time_in" type="time">
            
            <label>Time Out:</label>
            <input name="time_out" type="time">
            
            <button type="submit">Submit Conformity Report</button>
        </form>
    </div>
    
    <script>
        const SUPABASE_URL = 'https://pdwctzueksfuspwwumdy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkd2N0enVla3NmdXNwd3d1bWR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MTA3NDQsImV4cCI6MjA5MjM4Njc0NH0.Xi7MH3MLuxDx1FK6BKLJi-n47SQn-gPgWxq35NuRpZY';
        
        document.getElementById('reportForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = {};
            formData.forEach((value, key) => {
                if (value !== '' && value !== null) {
                    data[key] = value;
                }
            });
            
            data.status = 'PENDING';
            
            if (data.follow_up_required === 'true') data.follow_up_required = true;
            if (data.follow_up_required === 'false') data.follow_up_required = false;
            
            const numberFields = ['total_items_checked', 'compliant_items', 'non_compliant_items', 'hours_worked', 'tasks_completed'];
            numberFields.forEach(field => {
                if (data[field]) data[field] = parseFloat(data[field]) || 0;
            });
            
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/conformity_assessment`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    alert('✅ Conformity report submitted! Manager will review.');
                    document.getElementById('reportForm').reset();
                    document.querySelector('input[name="report_date"]').value = new Date().toISOString().split('T')[0];
                } else {
                    const error = await response.text();
                    alert('❌ Error: ' + error);
                }
            } catch (error) {
                alert('❌ Connection error: ' + error.message);
            }
        };
        
        document.querySelector('input[name="report_date"]').value = new Date().toISOString().split('T')[0];
    </script>
</body>
</html>
