<!DOCTYPE html>
<html>
<head>
    <title>VBS - Provincial Report</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 20px auto; padding: 20px; background: #f5f5f5; }
        .container { background: white; padding: 20px; border-radius: 10px; }
        h1 { color: #2c7a4d; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 12px; margin-top: 20px; background: #2c7a4d; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌾 Provincial Division</h1>
        <p>Daily Inspection Report</p>
        <form id="reportForm">
            <label>Officer Name:</label>
            <input name="officer_name" required>
            
            <label>Report Date:</label>
            <input name="report_date" type="date" required>
            
            <label>Province:</label>
            <select name="province">
                <option>Sanma</option><option>Malampa</option><option>Shefa</option>
                <option>Tafea</option><option>Penama</option><option>Torba</option>
            </select>
            
            <label>Location:</label>
            <input name="location">
            
            <label>GPS Coordinates:</label>
            <input name="gps_coordinates">
            
            <label>Inspection Result:</label>
            <select name="inspection_result">
                <option>Pass</option><option>Fail</option><option>Partial</option>
            </select>
            
            <label>Violation Type:</label>
            <input name="violation_type">
            
            <label>Inspections Conducted:</label>
            <input name="inspections_conducted" type="number" value="0">
            
            <label>Non-Compliance Cases:</label>
            <input name="non_compliance_cases" type="number" value="0">
            
            <label>Enforcement Actions:</label>
            <input name="enforcement_actions" type="number" value="0">
            
            <label>Farms Visited:</label>
            <input name="farms_visited" type="number" value="0">
            
            <label>Farmers Engaged:</label>
            <input name="farmers_engaged" type="number" value="0">
            
            <label>Samples Collected:</label>
            <input name="samples_collected" type="number" value="0">
            
            <label>Follow-up Required?</label>
            <select name="follow_up_required">
                <option value="false">No</option><option value="true">Yes</option>
            </select>
            
            <label>Follow-up Date:</label>
            <input name="follow_up_date" type="date">
            
            <label>Hours Worked:</label>
            <input name="hours_worked" type="number" step="0.5" value="8">
            
            <label>Tasks Completed:</label>
            <input name="tasks_completed" type="number" value="0">
            
            <label>Inspector Notes:</label>
            <textarea name="inspector_notes"></textarea>
            
            <button type="submit">Submit Report</button>
        </form>
    </div>
    <script>
        const SUPABASE_URL = 'https://pdwctzueksfuspwwumdy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkd2N0enVla3NmdXNwd3d1bWR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MTA3NDQsImV4cCI6MjA5MjM4Njc0NH0.Xi7MH3MLuxDx1FK6BKLJi-n47SQn-gPgWxq35NuRpZY';
        
        document.getElementById('reportForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = {};
            formData.forEach((v,k) => { if(v) data[k] = v; });
            data.status = 'PENDING';
            if(data.follow_up_required === 'true') data.follow_up_required = true;
            if(data.follow_up_required === 'false') data.follow_up_required = false;
            
            const response = await fetch(`${SUPABASE_URL}/rest/v1/provincial_reports`, {
                method: 'POST', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            alert(response.ok ? '✅ Report submitted!' : '❌ Error');
            if(response.ok) e.target.reset();
        };
        document.querySelector('input[name="report_date"]').value = new Date().toISOString().split('T')[0];
    </script>
</body>
</html>
