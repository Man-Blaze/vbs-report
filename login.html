<!DOCTYPE html>
<html>
<head>
    <title>VBS Timesheet Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; max-width: 400px; margin: 50px auto; padding: 20px; background: linear-gradient(135deg, #1a5a3a, #0d3b24); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        h1 { color: #2c7a4d; text-align: center; margin-bottom: 24px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; background: #2c7a4d; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background: #1e5a38; }
        .error { color: #dc3545; text-align: center; margin-top: 10px; font-size: 13px; }
        .info { text-align: center; margin-top: 20px; font-size: 12px; color: #666; }
        .spinner { display: none; text-align: center; margin-top: 10px; color: #2c7a4d; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 VBS Timesheet</h1>
        
        <div id="loginForm">
            <input type="email" id="email" placeholder="Email Address" autocomplete="email">
            <input type="password" id="password" placeholder="Password" autocomplete="current-password">
            <button onclick="login()">Login</button>
            <div id="errorMsg" class="error"></div>
            <div class="spinner" id="spinner">⏳ Logging in...</div>
        </div>
        
        <div class="info">
            🔒 Secure login using Supabase Auth<br>
            📧 Contact IT to get your credentials
        </div>
    </div>
    
    <script>
        // Initialize Supabase FIRST
        const SUPABASE_URL = 'https://pdwctzueksfuspwwumdy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkd2N0enVla3NmdXNwd3d1bWR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MTA3NDQsImV4cCI6MjA5MjM4Njc0NH0.Xi7MH3MLuxDx1FK6BKLJi-n47SQn-gPgWxq35NuRpZY';
        
        // Wait for Supabase to load
        let supabase = null;
        
        // Initialize when page loads
        window.addEventListener('DOMContentLoaded', function() {
            if (window.supabase) {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                console.log('Supabase initialized');
            } else {
                console.error('Supabase not loaded');
            }
        });
        
        async function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMsg');
            const spinner = document.getElementById('spinner');
            const loginBtn = document.querySelector('button');
            
            errorDiv.innerHTML = '';
            
            if (!email || !password) {
                errorDiv.innerHTML = '❌ Please enter email and password';
                return;
            }
            
            if (!supabase) {
                errorDiv.innerHTML = '❌ Loading... Please wait and try again';
                return;
            }
            
            spinner.style.display = 'block';
            loginBtn.disabled = true;
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) throw error;
                
                if (data.session) {
                    localStorage.setItem('vbs_token', data.session.access_token);
                    localStorage.setItem('vbs_user', email);
                    
                    // Try to get role, default to staff
                    try {
                        const { data: profile } = await supabase
                            .from('user_profiles')
                            .select('role')
                            .eq('id', data.user.id)
                            .single();
                        localStorage.setItem('vbs_role', profile?.role || 'staff');
                    } catch(e) {
                        localStorage.setItem('vbs_role', 'staff');
                    }
                    
                    window.location.href = 'timesheet.html';
                }
            } catch (error) {
                errorDiv.innerHTML = `❌ ${error.message}`;
                spinner.style.display = 'none';
                loginBtn.disabled = false;
            }
        }
        
        // Allow Enter key
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });
        document.getElementById('email').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
