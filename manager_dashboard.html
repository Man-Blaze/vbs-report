<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VBS Manager Dashboard - Timesheet Approval</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f5f7fb; padding: 24px; }
        .dashboard-container { max-width: 1200px; margin: 0 auto; }
        .header { margin-bottom: 28px; }
        .header h1 { font-size: 28px; font-weight: 600; color: #1a3a2e; margin-bottom: 6px; }
        .header p { font-size: 14px; color: #6c7a8a; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 28px; }
        .stat-card { background: white; border-radius: 20px; padding: 20px 24px; border: 1px solid #eef2f6; }
        .stat-number { font-size: 36px; font-weight: 700; color: #1a5a3a; }
        .stat-label { font-size: 14px; color: #6c7a8a; margin-top: 8px; }
        .filter-bar { background: white; border-radius: 16px; padding: 16px 24px; margin-bottom: 24px; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 16px; border: 1px solid #eef2f6; }
        .filter-group { display: flex; align-items: center; gap: 12px; }
        select { padding: 8px 32px 8px 14px; border: 1px solid #cbd5e1; border-radius: 12px; font-size: 14px; background: white; cursor: pointer; min-width: 220px; }
        .pending-badge { background: #fef3c7; color: #b45309; padding: 6px 14px; border-radius: 40px; font-size: 13px; font-weight: 500; }
        .refresh-btn { background: #f1f5f9; border: 1px solid #e2e8f0; padding: 8px 20px; border-radius: 12px; cursor: pointer; font-size: 13px; font-weight: 500; }
        .refresh-btn:hover { background: #e2e8f0; }
        .report-card { background: white; border-radius: 20px; border: 1px solid #eef2f6; margin-bottom: 16px; overflow: hidden; }
        .card-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; background: #fafcff; border-bottom: 1px solid #eef2f6; flex-wrap: wrap; gap: 12px; }
        .officer-info { display: flex; align-items: center; gap: 12px; }
        .officer-avatar { width: 40px; height: 40px; background: #e8f5e9; border-radius: 40px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .officer-name { font-weight: 600; font-size: 16px; color: #1e293b; }
        .report-date { font-size: 13px; color: #6c7a8a; display: flex; align-items: center; gap: 6px; }
        .card-body { padding: 20px 24px; }
        .detail-grid { display: flex; flex-direction: column; gap: 14px; }
        .detail-row { display: flex; flex-wrap: wrap; gap: 24px; align-items: flex-start; }
        .detail-field { display: flex; align-items: center; gap: 10px; min-width: 200px; }
        .field-icon { font-size: 18px; width: 28px; }
        .field-label { font-size: 13px; color: #6c7a8a; font-weight: 500; min-width: 100px; }
        .field-value { font-size: 14px; color: #1e293b; font-weight: 500; }
        .reason-box { background: #fff3cd; padding: 12px; border-radius: 10px; margin-top: 12px; border-left: 4px solid #ffc107; }
        .reason-label { font-weight: bold; font-size: 12px; color: #856404; margin-bottom: 4px; }
        .reason-text { font-size: 13px; color: #856404; }
        .overtime-box { background: #d4edda; padding: 12px; border-radius: 10px; margin-top: 12px; border-left: 4px solid #28a745; }
        .overtime-label { font-weight: bold; font-size: 12px; color: #155724; margin-bottom: 4px; }
        .card-footer { display: flex; justify-content: flex-end; gap: 12px; padding: 16px 24px; background: #fafcff; border-top: 1px solid #eef2f6; }
        .btn-approve { background: #1a5a3a; color: white; border: none; padding: 10px 28px; border-radius: 40px; cursor: pointer; font-size: 14px; font-weight: 500; }
        .btn-approve:hover { background: #0e3d26; }
        .btn-reject { background: white; color: #dc2626; border: 1px solid #dc2626; padding: 10px 28px; border-radius: 40px; cursor: pointer; font-size: 14px; font-weight: 500; }
        .btn-reject:hover { background: #dc2626; color: white; }
        .empty-state { text-align: center; padding: 60px 20px; background: white; border-radius: 20px; border: 1px solid #eef2f6; }
        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
        .empty-state h3 { font-size: 18px; font-weight: 500; color: #1e293b; margin-bottom: 8px; }
        .empty-state p { color: #6c7a8a; font-size: 14px; }
        .loading { text-align: center; padding: 60px; color: #6c7a8a; }
        .badge-late { background: #fff3cd; color: #856404; padding: 2px 8px; border-radius: 20px; font-size: 11px; margin-left: 8px; }
        .badge-early { background: #fff3cd; color: #856404; padding: 2px 8px; border-radius: 20px; font-size: 11px; margin-left: 8px; }
        .badge-overtime { background: #d4edda; color: #155724; padding: 2px 8px; border-radius: 20px; font-size: 11px; margin-left: 8px; }
        @media (max-width: 768px) {
            body { padding: 16px; }
            .stats-grid { grid-template-columns: 1fr; gap: 12px; }
            .filter-bar { flex-direction: column; align-items: stretch; }
            .detail-field { min-width: 100%; }
            .detail-row { flex-direction: column; gap: 12px; }
            .card-footer { flex-direction: column; }
            .btn-approve, .btn-reject { text-align: center; }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <h1>Manager Dashboard - Timesheet Approval</h1>
            <p>Review and approve staff attendance with accurate times and reasons</p>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="totalPending">0</div>
                <div class="stat-label">Pending Timesheets</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalLate">0</div>
                <div class="stat-label">Late Arrivals</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalEarly">0</div>
                <div class="stat-label">Early Departures</div>
            </div>
        </div>
        
        <div class="filter-bar">
            <div class="filter-group">
                <label>📂 Division:</label>
                <select id="divisionFilter">
                    <option value="">All Divisions</option>
                    <option value="Laboratory">Laboratory</option>
                    <option value="Provincial">Provincial</option>
                    <option value="Packhouse">Packhouse</option>
                    <option value="Standards">Standards</option>
                    <option value="Administration">Administration</option>
                </select>
            </div>
            <div class="filter-group">
                <span id="pendingBadge" class="pending-badge">0 pending</span>
                <button class="refresh-btn" onclick="loadTimesheets()">↻ Refresh</button>
            </div>
        </div>
        
        <div id="reportsContainer">
            <div class="loading">Loading timesheets...</div>
        </div>
    </div>
    
    <script>
        const SUPABASE_URL = 'https://pdwctzueksfuspwwumdy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkd2N0enVla3NmdXNwd3d1bWR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MTA3NDQsImV4cCI6MjA5MjM4Njc0NH0.Xi7MH3MLuxDx1FK6BKLJi-n47SQn-gPgWxq35NuRpZY';
        
        let allTimesheets = [];
        
        function isLate(timeIn) {
            if (!timeIn) return false;
            const [hours, minutes] = timeIn.split(':');
            const hour = parseInt(hours);
            const minute = parseInt(minutes);
            return hour > 8 || (hour === 8 && minute > 15);
        }
        
        function isEarly(timeOut) {
            if (!timeOut) return false;
            const [hours] = timeOut.split(':');
            return parseInt(hours) < 17;
        }
        
        function hasOvertime(timeOut) {
            if (!timeOut) return false;
            const [hours] = timeOut.split(':');
            return parseInt(hours) > 17;
        }
        
        async function loadTimesheets() {
            const divisionFilter = document.getElementById('divisionFilter').value;
            const container = document.getElementById('reportsContainer');
            
            container.innerHTML = '<div class="loading">Loading timesheets...</div>';
            
            try {
                let url = `${SUPABASE_URL}/rest/v1/timesheet?status=eq.PENDING&order=created_at.desc`;
                const response = await fetch(url, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                let data = await response.json();
                
                // Apply division filter
                if (divisionFilter) {
                    data = data.filter(t => t.division === divisionFilter);
                }
                
                allTimesheets = data;
                
                const lateCount = data.filter(t => isLate(t.time_in)).length;
                const earlyCount = data.filter(t => isEarly(t.time_out)).length;
                
                document.getElementById('pendingBadge').innerHTML = `${data.length} pending`;
                document.getElementById('totalPending').innerText = data.length;
                document.getElementById('totalLate').innerText = lateCount;
                document.getElementById('totalEarly').innerText = earlyCount;
                
                if (data.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">✅</div>
                            <h3>All caught up!</h3>
                            <p>No pending timesheets for approval</p>
                        </div>
                    `;
                    return;
                }
                
                let html = '';
                for (let report of data) {
                    const reportDate = report.report_date || 'N/A';
                    const isLateArrival = isLate(report.time_in);
                    const isEarlyDeparture = isEarly(report.time_out);
                    const hasOvertimeHours = hasOvertime(report.time_out);
                    
                    let badges = '';
                    if (isLateArrival) badges += '<span class="badge-late">⚠️ LATE</span>';
                    if (isEarlyDeparture) badges += '<span class="badge-early">⚠️ EARLY</span>';
                    if (hasOvertimeHours) badges += '<span class="badge-overtime">⏰ OVERTIME</span>';
                    
                    html += `
                        <div class="report-card">
                            <div class="card-header">
                                <div class="officer-info">
                                    <div class="officer-avatar">👤</div>
                                    <div class="officer-name">${report.officer_name || 'Unknown'}</div>
                                    ${badges}
                                </div>
                                <div class="report-date">📅 ${reportDate}</div>
                            </div>
                            <div class="card-body">
                                <div class="detail-grid">
                                    <div class="detail-row">
                                        <div class="detail-field">
                                            <span class="field-icon">⏰</span>
                                            <span class="field-label">Clock In</span>
                                            <span class="field-value">${report.time_in || '—'}</span>
                                        </div>
                                        <div class="detail-field">
                                            <span class="field-icon">⏰</span>
                                            <span class="field-label">Clock Out</span>
                                            <span class="field-value">${report.time_out || '—'}</span>
                                        </div>
                                        <div class="detail-field">
                                            <span class="field-icon">📅</span>
                                            <span class="field-label">Hours Worked</span>
                                            <span class="field-value">${report.hours_worked || '0'} hrs</span>
                                        </div>
                                        <div class="detail-field">
                                            <span class="field-icon">📍</span>
                                            <span class="field-label">Location</span>
                                            <span class="field-value">${report.location || '—'}</span>
                                        </div>
                                    </div>
                            `;
                    
                    if (report.late_reason) {
                        html += `
                            <div class="reason-box">
                                <div class="reason-label">⚠️ LATE REASON:</div>
                                <div class="reason-text">${report.late_reason}</div>
                            </div>
                        `;
                    }
                    
                    if (report.early_reason) {
                        html += `
                            <div class="reason-box">
                                <div class="reason-label">⚠️ EARLY DEPARTURE REASON:</div>
                                <div class="reason-text">${report.early_reason}</div>
                            </div>
                        `;
                    }
                    
                    if (report.overtime_hours && report.overtime_hours > 0) {
                        html += `
                            <div class="overtime-box">
                                <div class="overtime-label">⏰ OVERTIME: ${report.overtime_hours} extra hours</div>
                            </div>
                        `;
                    }
                    
                    html += `
                                </div>
                            </div>
                            <div class="card-footer">
                                <button class="btn-approve" onclick="approveTimesheet(${report.id})">✓ Approve Timesheet</button>
                                <button class="btn-reject" onclick="rejectTimesheet(${report.id})">✗ Reject</button>
                            </div>
                        </div>
                    `;
                }
                container.innerHTML = html;
                
            } catch (error) {
                console.error('Error:', error);
                container.innerHTML = `<div class="empty-state"><div class="icon">❌</div><h3>Error</h3><p>${error.message}</p></div>`;
            }
        }
        
        async function approveTimesheet(id) {
            if (!confirm('Approve this timesheet? This will send it to CEO dashboard.')) return;
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/timesheet?id=eq.${id}`, {
                    method: 'PATCH',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: 'APPROVED', approved_by: 'Manager', approved_at: new Date().toISOString() })
                });
                if (response.ok) {
                    alert('✓ Timesheet approved and sent to CEO');
                    loadTimesheets();
                } else {
                    const error = await response.text();
                    alert('Error: ' + error);
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
        
        async function rejectTimesheet(id) {
            const reason = prompt('Reason for rejection (will be visible to staff):');
            if (!reason) return;
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/timesheet?id=eq.${id}`, {
                    method: 'PATCH',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: 'REJECTED', manager_comment: reason })
                });
                if (response.ok) {
                    alert('✗ Timesheet rejected');
                    loadTimesheets();
                } else {
                    const error = await response.text();
                    alert('Error: ' + error);
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
        
        document.getElementById('divisionFilter').addEventListener('change', loadTimesheets);
        loadTimesheets();
    </script>
</body>
</html>
