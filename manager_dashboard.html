<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VBS Manager Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f5f7fb; padding: 24px; }
        .dashboard-container { max-width: 1200px; margin: 0 auto; }
        .header { margin-bottom: 28px; }
        .header h1 { font-size: 28px; font-weight: 600; color: #1a3a2e; margin-bottom: 6px; }
        .header p { font-size: 14px; color: #6c7a8a; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 28px; }
        .stat-card { background: white; border-radius: 20px; padding: 20px 24px; border: 1px solid #eef2f6; }
        .stat-number { font-size: 36px; font-weight: 700; color: #1a5a3a; }
        .stat-label { font-size: 14px; color: #6c7a8a; margin-top: 8px; }
        .filter-bar { background: white; border-radius: 16px; padding: 16px 24px; margin-bottom: 24px; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 16px; border: 1px solid #eef2f6; }
        .filter-group { display: flex; align-items: center; gap: 12px; }
        select { padding: 8px 32px 8px 14px; border: 1px solid #cbd5e1; border-radius: 12px; font-size: 14px; background: white; cursor: pointer; min-width: 220px; }
        .pending-badge { background: #fef3c7; color: #b45309; padding: 6px 14px; border-radius: 40px; font-size: 13px; font-weight: 500; }
        .refresh-btn { background: #f1f5f9; border: 1px solid #e2e8f0; padding: 8px 20px; border-radius: 12px; cursor: pointer; font-size: 13px; font-weight: 500; }
        .refresh-btn:hover { background: #e2e8f0; }
        .report-card { background: white; border-radius: 20px; border: 1px solid #eef2f6; margin-bottom: 16px; overflow: hidden; }
        .card-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; background: #fafcff; border-bottom: 1px solid #eef2f6; flex-wrap: wrap; gap: 12px; }
        .officer-info { display: flex; align-items: center; gap: 12px; }
        .officer-avatar { width: 40px; height: 40px; background: #e8f5e9; border-radius: 40px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .officer-name { font-weight: 600; font-size: 16px; color: #1e293b; }
        .report-date { font-size: 13px; color: #6c7a8a; display: flex; align-items: center; gap: 6px; }
        .card-body { padding: 20px 24px; }
        .detail-grid { display: flex; flex-direction: column; gap: 14px; }
        .detail-row { display: flex; flex-wrap: wrap; gap: 24px; align-items: flex-start; }
        .detail-field { display: flex; align-items: center; gap: 10px; min-width: 200px; }
        .field-icon { font-size: 18px; width: 28px; }
        .field-label { font-size: 13px; color: #6c7a8a; font-weight: 500; min-width: 90px; }
        .field-value { font-size: 14px; color: #1e293b; font-weight: 500; }
        .notes-section { margin-top: 16px; padding: 12px 16px; background: #f8fafc; border-radius: 14px; border-left: 3px solid #1a5a3a; }
        .notes-label { font-size: 12px; font-weight: 600; color: #1a5a3a; margin-bottom: 6px; }
        .notes-text { font-size: 13px; color: #334155; }
        .card-footer { display: flex; justify-content: flex-end; gap: 12px; padding: 16px 24px; background: #fafcff; border-top: 1px solid #eef2f6; }
        .btn-approve { background: #1a5a3a; color: white; border: none; padding: 10px 28px; border-radius: 40px; cursor: pointer; font-size: 14px; font-weight: 500; }
        .btn-approve:hover { background: #0e3d26; }
        .btn-reject { background: white; color: #dc2626; border: 1px solid #dc2626; padding: 10px 28px; border-radius: 40px; cursor: pointer; font-size: 14px; font-weight: 500; }
        .btn-reject:hover { background: #dc2626; color: white; }
        .empty-state { text-align: center; padding: 60px 20px; background: white; border-radius: 20px; border: 1px solid #eef2f6; }
        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
        .empty-state h3 { font-size: 18px; font-weight: 500; color: #1e293b; margin-bottom: 8px; }
        .empty-state p { color: #6c7a8a; font-size: 14px; }
        .loading { text-align: center; padding: 60px; color: #6c7a8a; }
        @media (max-width: 768px) {
            body { padding: 16px; }
            .stats-grid { grid-template-columns: 1fr; gap: 12px; }
            .filter-bar { flex-direction: column; align-items: stretch; }
            .detail-field { min-width: 100%; }
            .detail-row { flex-direction: column; gap: 12px; }
            .card-footer { flex-direction: column; }
            .btn-approve, .btn-reject { text-align: center; }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <h1>Manager Dashboard</h1>
            <p>Review and approve pending reports from your team</p>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="totalPending">0</div>
                <div class="stat-label">Pending Approval</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalApproved">0</div>
                <div class="stat-label">Approved Today</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="divisionsCount">10</div>
                <div class="stat-label">Divisions</div>
            </div>
        </div>
        
        <div class="filter-bar">
            <div class="filter-group">
                <label>📂 Division</label>
                <select id="divisionSelect">
                    <option value="provincial">Provincial</option>
                    <option value="laboratory">Laboratory</option>
                    <option value="packhouse">Packhouse</option>
                    <option value="standards">Standards & Certification</option>
                    <option value="administration">Administration</option>
                    <option value="conformity">Conformity Assessment</option>
                    <option value="general">General Activity</option>
                    <option value="timesheet">Timesheet</option>
                    <option value="leave_requests">📋 Leave Requests</option>
                    <option value="admin_report">Administration Report</option>
                </select>
            </div>
            <div class="filter-group">
                <span id="pendingBadge" class="pending-badge">0 pending</span>
                <button class="refresh-btn" onclick="loadReports()">↻ Refresh</button>
            </div>
        </div>
        
        <div id="reportsContainer">
            <div class="loading">Loading...</div>
        </div>
    </div>
    
    <script>
        const SUPABASE_URL = 'https://pdwctzueksfuspwwumdy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkd2N0enVla3NmdXNwd3d1bWR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MTA3NDQsImV4cCI6MjA5MjM4Njc0NH0.Xi7MH3MLuxDx1FK6BKLJi-n47SQn-gPgWxq35NuRpZY';
        
        // Direct table name mapping
        const tableMap = {
            provincial: 'provincial_reports',
            laboratory: 'laboratory_reports',
            packhouse: 'packhouse_reports',
            standards: 'standards_reports',
            administration: 'administration_reports',
            conformity: 'conformity_assessment',
            general: 'general_activity_log',
            timesheet: 'timesheet',
            leave_requests: 'leave_requests',
            admin_report: 'administration_reports'
        };
        
        function getDetailFields(report, division) {
            // For leave requests, show leave-specific fields
            if (division === 'leave_requests') {
                return `
                    <div class="detail-field"><span class="field-icon">📋</span><span class="field-label">Leave Type</span><span class="field-value">${report.leave_type || 'Annual'}</span></div>
                    <div class="detail-field"><span class="field-icon">📅</span><span class="field-label">Start Date</span><span class="field-value">${report.start_date || 'Not set'}</span></div>
                    <div class="detail-field"><span class="field-icon">📅</span><span class="field-label">End Date</span><span class="field-value">${report.end_date || 'Not set'}</span></div>
                    <div class="detail-field"><span class="field-icon">⏱️</span><span class="field-label">Duration</span><span class="field-value">${report.total_days || 0} days</span></div>
                    <div class="detail-field"><span class="field-icon">👤</span><span class="field-label">Supervisor</span><span class="field-value">${report.supervisor_name || 'Not specified'}</span></div>
                    ${report.reason ? `<div class="notes-section"><div class="notes-label">📝 Reason</div><div class="notes-text">${report.reason}</div></div>` : ''}
                `;
            }
            
            // Default for other divisions
            return `<div class="notes-section"><div class="notes-text">${report.inspector_notes || report.notes || 'Report submitted'}</div></div>`;
        }
        
        async function loadReports() {
            const division = document.getElementById('divisionSelect').value;
            const table = tableMap[division];
            const container = document.getElementById('reportsContainer');
            
            console.log('Loading from table:', table);
            
            container.innerHTML = '<div class="loading">Loading...</div>';
            
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/${table}?status=eq.PENDING&order=created_at.desc`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                const data = await response.json();
                
                console.log('Data received:', data);
                
                document.getElementById('pendingBadge').innerHTML = `${data.length} pending`;
                document.getElementById('totalPending').innerText = data.length;
                
                if (data.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">✅</div>
                            <h3>All caught up!</h3>
                            <p>No pending reports for this division</p>
                        </div>
                    `;
                    return;
                }
                
                let html = '';
                for (let report of data) {
                    const reportDate = report.report_date || report.created_at?.split('T')[0] || 'N/A';
                    html += `
                        <div class="report-card">
                            <div class="card-header">
                                <div class="officer-info">
                                    <div class="officer-avatar">👤</div>
                                    <div class="officer-name">${report.officer_name || 'Unknown'}</div>
                                </div>
                                <div class="report-date">📅 ${reportDate}</div>
                            </div>
                            <div class="card-body">
                                <div class="detail-grid">
                                    <div class="detail-row">
                                        ${getDetailFields(report, division)}
                                    </div>
                                </div>
                            </div>
                            <div class="card-footer">
                                <button class="btn-approve" data-table="${table}" data-id="${report.id}">✓ Approve</button>
                                <button class="btn-reject" data-table="${table}" data-id="${report.id}">✗ Reject</button>
                            </div>
                        </div>
                    `;
                }
                container.innerHTML = html;
                
                // Attach event listeners
                document.querySelectorAll('.btn-approve').forEach(btn => {
                    btn.addEventListener('click', () => approveReport(btn.dataset.table, parseInt(btn.dataset.id)));
                });
                document.querySelectorAll('.btn-reject').forEach(btn => {
                    btn.addEventListener('click', () => rejectReport(btn.dataset.table, parseInt(btn.dataset.id)));
                });
                
            } catch (error) {
                console.error('Error:', error);
                container.innerHTML = `<div class="empty-state"><div class="icon">❌</div><h3>Error</h3><p>${error.message}</p></div>`;
            }
        }
        
        async function approveReport(table, id) {
            if (!confirm('Approve this report?')) return;
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
                    method: 'PATCH',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: 'APPROVED', approved_by: 'Manager', approved_at: new Date().toISOString() })
                });
                if (response.ok) {
                    alert('✓ Report approved');
                    loadReports();
                } else {
                    const error = await response.text();
                    alert('Error: ' + error);
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
        
        async function rejectReport(table, id) {
            const reason = prompt('Reason for rejection:');
            if (!reason) return;
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
                    method: 'PATCH',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: 'REJECTED', manager_comment: reason })
                });
                if (response.ok) {
                    alert('✗ Report rejected');
                    loadReports();
                } else {
                    const error = await response.text();
                    alert('Error: ' + error);
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
        
        // Load on page load and when dropdown changes
        document.getElementById('divisionSelect').addEventListener('change', loadReports);
        loadReports();
    </script>
</body>
</html>
