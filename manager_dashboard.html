<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VBS Manager Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            padding: 20px;
        }
        
        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* Header */
        .header {
            background: linear-gradient(135deg, #1a5a3a 0%, #2c7a4d 100%);
            color: white;
            padding: 25px 30px;
            border-radius: 15px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: transform 0.2s;
        }
        
        .stat-card:hover {
            transform: translateY(-2px);
        }
        
        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #2c7a4d;
        }
        
        .stat-label {
            font-size: 13px;
            color: #666;
            margin-top: 5px;
        }
        
        /* Filter Bar */
        .filter-bar {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .filter-group {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .filter-group label {
            font-weight: 600;
            color: #333;
        }
        
        select {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            cursor: pointer;
            min-width: 200px;
        }
        
        .pending-badge {
            background: #ffc107;
            color: #333;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
        }
        
        .refresh-btn {
            background: #2c7a4d;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }
        
        .refresh-btn:hover {
            background: #1e5a38;
        }
        
        /* Reports Table */
        .reports-section {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .section-title {
            padding: 18px 20px;
            background: #f8f9fa;
            border-bottom: 2px solid #2c7a4d;
            font-weight: 600;
            font-size: 16px;
            color: #333;
        }
        
        .table-wrapper {
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background: #f8f9fa;
            padding: 14px 12px;
            text-align: left;
            font-weight: 600;
            font-size: 13px;
            color: #555;
            border-bottom: 1px solid #e0e0e0;
        }
        
        td {
            padding: 14px 12px;
            border-bottom: 1px solid #eee;
            font-size: 13px;
            color: #333;
            vertical-align: middle;
        }
        
        tr:hover {
            background: #f8f9fa;
        }
        
        .empty-row td {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        /* Buttons */
        .btn-approve {
            background: #2c7a4d;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            margin-right: 6px;
            transition: background 0.2s;
        }
        
        .btn-approve:hover {
            background: #1e5a38;
        }
        
        .btn-reject {
            background: #dc3545;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: background 0.2s;
        }
        
        .btn-reject:hover {
            background: #b02a37;
        }
        
        /* Detail Card (inside table cell) */
        .detail-preview {
            background: #f8f9fa;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 12px;
            color: #555;
            max-width: 350px;
        }
        
        .detail-preview span {
            display: inline-block;
            background: #e0e0e0;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            margin-right: 5px;
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .header h1 { font-size: 22px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            th, td { padding: 10px 8px; font-size: 12px; }
            .btn-approve, .btn-reject { padding: 4px 10px; font-size: 11px; }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Header -->
        <div class="header">
            <h1>📋 VBS Manager Dashboard</h1>
            <p>Review, approve, or reject reports from your team. Only approved data reaches the CEO.</p>
        </div>
        
        <!-- Stats Cards -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-number" id="totalPending">0</div>
                <div class="stat-label">Total Pending</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalApproved">0</div>
                <div class="stat-label">Approved Today</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="divisionsCount">7</div>
                <div class="stat-label">Divisions</div>
            </div>
        </div>
        
        <!-- Filter Bar -->
        <div class="filter-bar">
            <div class="filter-group">
                <label>📂 Division:</label>
                <select id="divisionSelect" onchange="loadReports()">
                    <option value="provincial">🌾 Provincial (Inspections)</option>
                    <option value="laboratory">🔬 Laboratory</option>
                    <option value="packhouse">📦 Packhouse</option>
                    <option value="standards">📜 Standards & Certification</option>
                    <option value="administration">📋 Administration</option>
                    <option value="conformity">✅ Conformity Assessment</option>
                    <option value="general">📝 General Activity Log</option>
                    <option value="timesheet">⏰ Timesheet / Attendance</option>
                </select>
            </div>
            <div class="filter-group">
                <span id="pendingBadge" class="pending-badge">0 pending</span>
                <button class="refresh-btn" onclick="loadReports()">🔄 Refresh</button>
            </div>
        </div>
        
        <!-- Reports Table -->
        <div class="reports-section">
            <div class="section-title">
                📊 Pending Reports
            </div>
            <div class="table-wrapper" id="reportsTable">
                <div class="loading">Loading reports...</div>
            </div>
        </div>
    </div>
    
    <script>
        const SUPABASE_URL = 'https://pdwctzueksfuspwwumdy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkd2N0enVla3NmdXNwd3d1bWR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MTA3NDQsImV4cCI6MjA5MjM4Njc0NH0.Xi7MH3MLuxDx1FK6BKLJi-n47SQn-gPgWxq35NuRpZY';
        
        const tableMap = {
            provincial: 'provincial_reports',
            laboratory: 'laboratory_reports',
            packhouse: 'packhouse_reports',
            standards: 'standards_reports',
            administration: 'administration_reports',
            conformity: 'conformity_assessment',
            general: 'general_activity_log',
            timesheet: 'timesheet'
        };
        
        function getDetailHTML(report, division) {
            switch(division) {
                case 'provincial':
                    return `<div class="detail-preview">
                        <span>📍 ${report.location || 'No location'}</span>
                        <span>📊 ${report.inspection_result || 'N/A'}</span>
                        <span>⚠️ ${report.non_compliance_cases || 0} NC</span>
                        ${report.inspector_notes ? `<div style="margin-top:5px;">📝 ${report.inspector_notes.substring(0, 80)}${report.inspector_notes.length > 80 ? '...' : ''}</div>` : ''}
                    </div>`;
                    
                case 'laboratory':
                    return `<div class="detail-preview">
                        <span>🧪 ${report.sample_id || 'No ID'}</span>
                        <span>🔬 ${report.test_type || 'N/A'}</span>
                        <span>📊 ${report.test_result || 'N/A'}</span>
                        ${report.equipment_issues ? `<div style="margin-top:5px;">⚠️ ${report.equipment_issues.substring(0, 60)}</div>` : ''}
                    </div>`;
                    
                case 'packhouse':
                    return `<div class="detail-preview">
                        <span>📦 ${(report.volume_processed_kg || 0).toLocaleString()} kg</span>
                        <span>🗑️ ${report.waste_percent || 0}% waste</span>
                        <span>📉 ${report.rejection_rate_percent || 0}% reject</span>
                        <span>👥 ${report.staff_on_duty || 0} staff</span>
                    </div>`;
                    
                case 'standards':
                    return `<div class="detail-preview">
                        <span>📄 ${report.standard_name || 'No name'}</span>
                        <span>📌 ${report.standard_stage || 'Draft'}</span>
                        <span>🎓 ${report.certifications_issued || 0} certs</span>
                    </div>`;
                    
                case 'administration':
                    return `<div class="detail-preview">
                        <span>🏖️ ${report.leave_type || 'No leave'}</span>
                        <span>💚 ${report.health_status || 'Fit'}</span>
                        <span>💰 ${report.budget_utilization_percent || 0}% budget</span>
                    </div>`;
                    
                case 'conformity':
                    return `<div class="detail-preview">
                        <span>🏢 ${report.entity_name || 'No entity'}</span>
                        <span>📊 ${report.assessment_result || 'N/A'}</span>
                        <span>⚠️ ${report.non_compliance_type || 'None'}</span>
                        ${report.non_compliance_description ? `<div style="margin-top:5px;">📝 ${report.non_compliance_description.substring(0, 60)}</div>` : ''}
                    </div>`;
                    
                case 'general':
                    return `<div class="detail-preview">
                        <span>📌 ${report.activity_type || 'N/A'}</span>
                        <span>🏷️ ${report.activity_name || 'No name'}</span>
                        ${report.stakeholder_name ? `<span>🤝 ${report.stakeholder_name}</span>` : ''}
                        <div style="margin-top:5px;">📝 ${(report.activity_description || report.outcome || 'No description').substring(0, 80)}</div>
                    </div>`;

                case 'timesheet':
                    return `<div class="detail-preview">
                        <span>⏰ ${report.time_in || '—'} → ${report.time_out || '—'}</span>
                        <span>📅 Hours: ${report.hours_worked || '0'}</span>
                       <span>📍 ${report.location || 'No location'}</span>
                   </div>`;
                    
                default:
                    return `<div class="detail-preview">${report.inspector_notes || report.notes || 'Report submitted'}</div>`;
            }
        }
        
        async function loadReports() {
            const division = document.getElementById('divisionSelect').value;
            const table = tableMap[division];
            const pendingSpan = document.getElementById('pendingBadge');
            const reportsDiv = document.getElementById('reportsTable');
            
            reportsDiv.innerHTML = '<div class="loading">⏳ Loading reports...</div>';
            
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/${table}?status=eq.PENDING&order=report_date.desc`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                const data = await response.json();
                
                pendingSpan.innerHTML = `${data.length} pending`;
                document.getElementById('totalPending').innerText = data.length;
                
                if (data.length === 0) {
                    reportsDiv.innerHTML = `
                        <table>
                            <tr class="empty-row"><td>✅ No pending reports. Good job!</td></tr>
                        </table>
                    `;
                    return;
                }
                
                let html = `<table>
                    <thead>
                        <tr>
                            <th>📅 Date</th>
                            <th>👤 Officer</th>
                            <th>📋 Report Details</th>
                            <th>⚡ Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                `;
                
                for (let report of data) {
                    const reportDate = report.report_date || (report.created_at ? report.created_at.split('T')[0] : 'N/A');
                    html += `
                        <tr>
                            <td>${reportDate}</td>
                            <td><strong>${report.officer_name || 'Unknown'}</strong></td>
                            <td>${getDetailHTML(report, division)}</td>
                            <td>
                                <button class="btn-approve" onclick="approveReport('${table}', ${report.id})">✅ Approve</button>
                                <button class="btn-reject" onclick="rejectReport('${table}', ${report.id})">❌ Reject</button>
                            </td>
                        </tr>
                    `;
                }
                html += '</tbody></table>';
                reportsDiv.innerHTML = html;
                
            } catch (error) {
                reportsDiv.innerHTML = `<div class="loading">❌ Error: ${error.message}</div>`;
            }
        }
        
        async function approveReport(table, id) {
            if (!confirm('Approve this report?')) return;
            
            try {
                await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
                    method: 'PATCH',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: 'APPROVED', approved_by: 'Manager', approved_at: new Date().toISOString() })
                });
                alert('✅ Report approved');
                loadReports();
            } catch (error) {
                alert('❌ Error: ' + error.message);
            }
        }
        
        async function rejectReport(table, id) {
            const reason = prompt('Reason for rejection:');
            if (!reason) return;
            
            try {
                await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
                    method: 'PATCH',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: 'REJECTED', manager_comment: reason })
                });
                alert('❌ Report rejected');
                loadReports();
            } catch (error) {
                alert('❌ Error: ' + error.message);
            }
        }
        
        // Load on page start
        loadReports();
    </script>
</body>
</html>
